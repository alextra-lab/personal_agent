# CI — Personal Agent
#
# Runs on pull_request (all branches) and push to main only — PR branches are
# validated once, not twice (process v2, FRE-777, 2026-07-04). Jobs are
# path-aware: expensive jobs skip via job-level `if:` when their paths didn't
# change; a skipped conclusion satisfies required status checks (unlike
# workflow-level `paths:` filters, which leave required checks pending forever).
# On push to main everything runs unconditionally (post-merge full validation).
#
# CI-vs-on-demand split (FRE-400):
#   IN CI (this file)   — unit tests, integration tests against ephemeral containers,
#                          static analysis (mypy, ruff).  Fast, deterministic.
#   ON DEMAND ONLY      — LLM eval harness (`make eval`, 100+ live LLM calls),
#                          full recovery/skill-routing surveys, manual device tests.
#
# Jobs:
#   backend-unit        — `make test` (all unit tests, no Postgres/LLM required)
#   backend-integration — `pytest -m integration -k transport` against a real
#                         Postgres service container (FRE-390 / FRE-400 Tier-2)
#   lint                — mypy + ruff-check + ruff-format
#   pwa-unit            — Vitest component tests for seshat-pwa (placeholder; WS2)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  # ── Changed-path detection (drives job-level skips; NOT a required check) ────
  changes:
    name: Detect changed paths
    runs-on: ubuntu-24.04
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      pwa: ${{ steps.filter.outputs.pwa }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/**'
              - 'tests/**'
              - 'scripts/**'
              - 'docker/**'
              - 'config/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/ci.yml'
            pwa:
              - 'seshat-pwa/**'
              - '.github/workflows/ci.yml'

  # ── Backend unit tests ──────────────────────────────────────────────────────
  backend-unit:
    name: Backend unit tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests
        run: uv run python -m pytest -m "not integration" -q --tb=short
        env:
          APP_ENV: test
          AGENT_NEO4J_URI: bolt://localhost:7688
          AGENT_ELASTICSEARCH_URL: http://localhost:9201
          AGENT_DATABASE_URL: postgresql+asyncpg://agent:agent_dev_password@localhost:5433/personal_agent
          AGENT_ELASTICSEARCH_INDEX_PREFIX: agent-logs-test
          AGENT_CAPTAINS_LOG_INDEX_PREFIX: agent-captains-test
          # No AGENT_OWNER_EMAIL: the dev-mode fallback in get_request_user
          # requires both gateway_auth_enabled=False AND agent_owner_email set.
          # Without agent_owner_email the fallback is skipped → 401 raised
          # correctly. Setting it here would trigger a Postgres lookup when no
          # service container is available, causing 500 instead of 401 in auth
          # tests (test_list_artifacts_requires_auth, test_card_click_no_auth_is_401).

  # ── Backend integration tests (real Postgres) ───────────────────────────────
  backend-integration:
    name: Backend integration tests (transport)
    runs-on: ubuntu-24.04
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.backend == 'true'
    # No Docker service container — uses the runner's apt-installed Postgres to
    # avoid Docker Hub pull failures (transient registry timeouts have broken CI).
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Start PostgreSQL and create test database
        run: |
          sudo systemctl start postgresql
          sudo -u postgres psql -c "CREATE USER agent WITH PASSWORD 'agent_dev_password';"
          sudo -u postgres createdb -O agent personal_agent
          # Bind on 5433 so the existing AGENT_DATABASE_URL (port 5433) works without changes.
          # The runner's default Postgres listens on 5432; add a second port via config.
          sudo -u postgres psql -c "ALTER SYSTEM SET port = 5433;"
          sudo systemctl restart postgresql
          # Wait for Postgres to accept connections on the new port.
          until pg_isready -h localhost -p 5433 -U agent; do sleep 1; done

      - name: Apply database schema
        run: |
          PGPASSWORD=agent_dev_password psql \
            -h localhost -p 5433 -U agent -d personal_agent \
            -f docker/postgres/init.sql

      - name: Run transport integration tests
        run: |
          PERSONAL_AGENT_INTEGRATION=1 uv run python -m pytest -m integration \
            -k "transport" \
            -v --tb=short
        env:
          APP_ENV: test
          AGENT_NEO4J_URI: bolt://localhost:7688
          AGENT_ELASTICSEARCH_URL: http://localhost:9201
          AGENT_DATABASE_URL: postgresql+asyncpg://agent:agent_dev_password@localhost:5433/personal_agent
          AGENT_ELASTICSEARCH_INDEX_PREFIX: agent-logs-test
          AGENT_CAPTAINS_LOG_INDEX_PREFIX: agent-captains-test
          AGENT_OWNER_EMAIL: ci-test@example.com

  # ── Static analysis ─────────────────────────────────────────────────────────
  lint:
    name: Lint (mypy + ruff)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: mypy
        run: uv run mypy src/

      # Pin ruff to the version the project resolves to (uv.lock: 0.15.15), matching
      # local `make ruff-check`/`make ruff-format`. Unpinned `uv tool run ruff` pulls
      # the latest, which drifted: a new ruff release reformatted markdown code-blocks
      # and turned CI red on pre-existing, unchanged src/**/AGENTS.md files (FRE-953).
      # (ruff is a dev *extra*, not synced by `uv sync`, so `uv tool run` — not
      # `uv run` — is required; the version pin is what makes it deterministic.)
      - name: ruff check
        run: uv tool run ruff@0.15.15 check src/

      - name: ruff format (check only)
        run: uv tool run ruff@0.15.15 format --check src/

  # ── Telemetry surface reconciliation (ADR-0090 D5, GATE) ─────────────────────
  # Hermetic static check: ES index templates ↔ Kibana dashboard NDJSON + trap-class
  # mapping lint. Hard gate (FRE-555): fails on any floor finding whose (check, klass,
  # family, field, source) key is NOT in the committed allowlist. The baseline grand-
  # fathers only reviewed-correct exceptions (name-heuristic false positives) + the two
  # *_ms→float fixes deferred to a reindex follow-up — each annotated with its rationale
  # in scripts/audit/telemetry_surface_baseline.json. New/changed drift fails the build.
  telemetry-surface:
    name: Telemetry surface reconciliation (gate)
    runs-on: ubuntu-24.04
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Reconcile emit ↔ mapping ↔ dashboard (gate on new drift)
        run: uv run python -m scripts.audit.telemetry_surface_check --gate --baseline scripts/audit/telemetry_surface_baseline.json

  # ── Cross-config guard (ADR-0099 D1/D4, FRE-649) ────────────────────────────
  config-guard:
    name: Config guard (roles, orphan env, secrets)
    runs-on: ubuntu-24.04
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run cross-config guard
        run: uv run python scripts/check_config.py

  # ── PWA unit tests ──────────────────────────────────────────────────────────
  # WS2 (Vitest component tests) — added once `make test-pwa` is wired in PR2.
  pwa-unit:
    name: PWA unit tests (Vitest)
    runs-on: ubuntu-24.04
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.pwa == 'true'
    defaults:
      run:
        working-directory: seshat-pwa
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: seshat-pwa/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npx vitest run

  # ── PWA Playwright e2e tests ────────────────────────────────────────────────
  pwa-e2e:
    name: PWA e2e tests (Playwright)
    runs-on: ubuntu-24.04
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.pwa == 'true'
    defaults:
      run:
        working-directory: seshat-pwa
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: seshat-pwa/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e tests
        run: npx playwright test
        env:
          CI: "true"
