# See https://pre-commit.com
# Install: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: check-no-personal-paths
        name: No personal filesystem paths in tracked files
        entry: uv run python scripts/check_no_personal_paths.py
        language: system
        pass_filenames: false
        always_run: true
