# See https://pre-commit.com
# Install: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: check-no-personal-paths
        name: No personal filesystem paths in tracked files
        entry: uv run python scripts/check_no_personal_paths.py
        language: system
        pass_filenames: false
        always_run: true
      - id: check-no-deployment-identifier
        name: No real deployment domain in tracked files (FRE-895)
        entry: uv run python scripts/check_no_deployment_identifier.py
        language: system
        pass_filenames: false
        always_run: true
      - id: check-no-direct-substrate-in-tests
        name: No direct substrate access in tests/eval scripts
        entry: uv run python scripts/check_no_direct_substrate_in_tests.py
        language: system
        pass_filenames: false
        always_run: true
      - id: check-identity-threaded
        name: ADR-0074 §I3/§I5 identity threading (log/bus.publish/Cypher MERGE)
        entry: uv run python scripts/check_identity_threaded.py
        language: system
        files: ^src/personal_agent/.*\.py$
        pass_filenames: false
        args: [src/personal_agent/]
      - id: check-config-guard
        name: ADR-0099 D1/D4 cross-config guard (roles, orphan env, secrets)
        entry: uv run python scripts/check_config.py
        language: system
        pass_filenames: false
        always_run: true
      - id: check-adr-index
        name: ADR index — files indexed, statuses match, no orphan rows (next_adr --check)
        entry: uv run python scripts/next_adr.py --check
        language: system
        files: ^docs/architecture_decisions/.*$
        pass_filenames: false
