# config/deployment.yaml — ADR-0099 D2.2 deployment-provenance manifest (stage 3, FRE-651)
#
# Answers "which deployment targets exist, and what composes them?" from
# committed files alone. No running container is ever inspected.
#
# `model_config_path` and `env_overrides` were REMOVED in FRE-916 phase 2
# (ADR-0121). They recorded which of two model-definition files each profile
# selected via AGENT_MODEL_CONFIG_PATH; there is now exactly one catalog
# (config/models.yaml) and no environment variable selecting it, so both fields
# — and the two guards that cross-checked them
# (config_guard.check_deployment_manifest_internal_consistency, and the
# env-override half of check_deployment_manifest_matches_compose) — described a
# choice that no longer exists.
#
# Each profile name here matches AGENT_DEPLOYMENT_PROFILE, which the
# corresponding compose file sets and which keys the per-profile required-secret
# set in config/model_roles.yaml (ADR-0099 D4).
profiles:
  local:
    compose_file: docker-compose.yml
  cloud:
    compose_file: docker-compose.cloud.yml
  eval:
    compose_file: docker-compose.eval.yml
