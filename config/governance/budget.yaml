# Cost Check Gate — per-role budgets and denial behaviour (ADR-0065).
#
# Caps user-confirmed 2026-05-01 (FRE-302 implementation session).
# entity_extraction and captains_log dailies were bumped from the ADR
# placeholders ($1.50 / $0.50) to $2.50 each — "for the days I have a lot
# of interaction".
#
# The auto-tuning monitor (FRE-311) will eventually propose Linear tickets
# to raise/lower these caps based on observed utilisation. Until then, edit
# this file by hand and ask the user before deviating from confirmed values.
version: 1

roles:
  main_inference:
    default_output_tokens: 1024
    safety_factor: 1.2
    on_denial: raise        # FastAPI 503 → PWA error card
  entity_extraction:
    default_output_tokens: 256
    safety_factor: 1.2
    on_denial: nack         # background consumer NACK → Redis Streams redeliver
  captains_log:
    default_output_tokens: 512
    safety_factor: 1.2
    on_denial: nack
  insights:
    default_output_tokens: 512
    safety_factor: 1.2
    on_denial: nack
  promotion:
    default_output_tokens: 256
    safety_factor: 1.2
    on_denial: nack
  freshness:
    default_output_tokens: 128
    safety_factor: 1.2
    on_denial: nack
  skill_routing:
    default_output_tokens: 64       # returns a small JSON array of skill names
    safety_factor: 1.2
    on_denial: raise                # surface failures instead of silently returning []
  study:
    default_output_tokens: 512
    safety_factor: 1.2
    on_denial: raise                # standalone one-shot script (scripts/study/run_ingest.py) — surface budget denial immediately, nothing to NACK/redeliver

caps:
  - {time_window: daily,  role: entity_extraction, cap_usd: 5.00}   # reset 2026-07-04: FRE-771 powered A/B complete (was TEMP BUMP to $25.00)
  - {time_window: daily,  role: captains_log,      cap_usd: 2.50}   # user-confirmed 2026-05-01
  - {time_window: daily,  role: main_inference,    cap_usd: 15.00}  # TEMP BUMP 2026-05-08→2026-05-10: FRE-334 eval runs; reset to $5.00
  - {time_window: daily,  role: skill_routing,     cap_usd: 0.10}   # user-confirmed 2026-05-07
  - {time_window: daily,  role: study,              cap_usd: 5.00}   # FRE-839: ADR-0114 study categorizer, isolated from entity_extraction's cap so a one-time corpus run can never contend with live prod extraction — owner-confirmed 2026-07-10
  - {time_window: weekly, role: entity_extraction, cap_usd: 7.00}   # reset 2026-07-04: FRE-771 powered A/B complete (was TEMP BUMP to $45.00)
  - {time_window: weekly, role: main_inference,    cap_usd: 40.00}  # TEMP BUMP 2026-05-08→2026-05-10: FRE-334 eval runs; reset to $18.00
  - {time_window: weekly, role: skill_routing,     cap_usd: 0.50}   # user-confirmed 2026-05-07
  - {time_window: weekly, role: study,              cap_usd: 7.00}   # FRE-839: see daily cap note above — owner-confirmed 2026-07-10
  - {time_window: weekly, role: _total,            cap_usd: 50.00}  # TEMP BUMP 2026-05-08→2026-05-10: FRE-334 eval runs; reset to $25.00
