# Tool permissions and risk classifications
# See ADR-0005 for detailed semantics

# Per-mode allowed categories. Used by the mode-policy gate in evaluate_governance().
# Not intersected with TaskType — the TaskType→tool-filter wire was severed in
# ADR-0063 §D1 (FRE-260). mode is the only tool-availability signal.
mode_policies:
  NORMAL:
    allowed_categories: ["read_only", "network", "system_write", "system_dangerous", "essential_health_check"]
  ALERT:
    allowed_categories: ["read_only", "system_dangerous", "essential_health_check"]
  DEGRADED:
    allowed_categories: ["read_only", "system_dangerous", "essential_health_check"]
  LOCKDOWN:
    allowed_categories: ["essential_health_check"]
  RECOVERY:
    allowed_categories: ["read_only", "essential_health_check"]

tool_categories:
  read_only:
    description: "Tools that only observe, never modify"
    risk_level: "low"
    examples: ["read_file", "list_directory", "system_metrics_snapshot"]

  system_dangerous:
    description: "Tools that execute arbitrary code or shell commands; governed at action-boundary"
    risk_level: "high"

  system_write:
    description: "Tools that modify system state"
    risk_level: "high"
    requires_approval_in_modes: ["ALERT", "DEGRADED", "LOCKDOWN", "RECOVERY"]
    examples: ["write_file", "execute_shell_command", "modify_config"]

  network:
    description: "Tools that access the network"
    risk_level: "medium"
    requires_outbound_gateway: true
    examples: ["web_search", "http_request"]

  essential_health_check:
    description: "Minimal health checks, always allowed"
    risk_level: "low"
    examples: ["check_disk_space", "check_process_health"]

tools:
  # Native web search via SearXNG (ADR-0034)
  web_search:
    category: "network"
    allowed_in_modes: ["NORMAL", "ALERT", "DEGRADED"]
    risk_level: "low"
    requires_approval: false
    timeout_seconds: 15
    rate_limit_per_hour: 120

  read_file:
    category: "read_only"
    allowed_in_modes: ["NORMAL", "ALERT", "DEGRADED", "LOCKDOWN", "RECOVERY"]
    max_file_size_mb: 10

  write_file:
    category: "system_write"
    allowed_in_modes: ["NORMAL"]
    requires_approval_in_modes: ["ALERT", "DEGRADED", "RECOVERY"]
    forbidden_in_modes: ["LOCKDOWN"]
    allowed_paths:
      - "$HOME/**/personal_agent/**"
      - "$HOME/Documents/agent_workspace/**"
    forbidden_paths:
      - "/System/**"
      - "/Library/**"
      - "$HOME/.ssh/**"
    loop_max_per_signature: 1
    loop_max_consecutive: 2

  # FRE-261 Step 3: primitive read tool (supersedes read_file)
  read:
    category: "read_only"
    allowed_in_modes: ["NORMAL", "ALERT", "DEGRADED", "LOCKDOWN", "RECOVERY"]
    max_file_size_mb: 10
    allowed_paths:
      - "/app/**"
      - "$HOME/**/personal_agent/**"
      - "$HOME/Documents/agent_workspace/**"
      - "/tmp/**"
      - "/opt/seshat/**"
    forbidden_paths:
      - "$HOME/.ssh/**"
      - "/etc/shadow"
      - "/etc/passwd"
      - "/proc/**"

  # FRE-261 Step 3: primitive write tool (supersedes write_file)
  write:
    category: "system_write"
    allowed_in_modes: ["NORMAL", "ALERT", "DEGRADED", "RECOVERY"]
    forbidden_in_modes: ["LOCKDOWN"]
    requires_approval_in_modes: ["ALERT", "DEGRADED", "RECOVERY"]
    unattended_paths:
      - "/app/agent_workspace/sandbox/**"
      - "/tmp/**"
    allowed_paths:
      - "/app/**"
      - "$HOME/**/personal_agent/**"
      - "$HOME/Documents/agent_workspace/**"
      - "/tmp/**"
      - "/opt/seshat/**"
    forbidden_paths:
      - "$HOME/.ssh/**"
      - "/etc/**"
      - "/proc/**"
    loop_max_per_signature: 1
    loop_max_consecutive: 2

  system_metrics_snapshot:
    category: "read_only"
    allowed_in_modes: ["NORMAL", "ALERT", "DEGRADED", "LOCKDOWN", "RECOVERY"]

