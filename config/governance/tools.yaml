    timeout_seconds: 60
    rate_limit_per_hour: 60
    loop_max_per_signature: 5
    loop_max_consecutive: 10
    loop_consecutive_terminal: true  # FRE-279: syntax errors → 400s; terminate instead of indefinite retry

  # FRE-261 Step 4: sandboxed bash executor with allowlist-based approval model
  bash:
    category: "system_dangerous"
    allowed_in_modes: ["NORMAL", "ALERT", "DEGRADED"]
    forbidden_in_modes: ["LOCKDOWN", "RECOVERY"]
    requires_approval: true
    auto_approve_prefixes:
      NORMAL:
        - "curl"
        - "grep"
        - "ls"
        - "cat"
        - "find"
        - "jq"
        - "docker ps"
        - "docker logs"
        - "git log"
        - "git status"
        - "git diff"
        - "psql -c"
        - "redis-cli"
        - "ps"
        - "top"
        - "free"
        - "df"
        - "uptime"
        - "wc"
        - "rg"
        - "awk"
        - "sed"
      ALERT:
        - "curl"
        - "grep"
        - "ls"
        - "cat"
        - "ps"
        - "top"
        - "free"
        - "df"
      DEGRADED:
        - "curl"
        - "grep"
        - "ls"
        - "cat"
        - "ps"
        - "top"
        - "free"
        - "df"
    hard_deny_patterns:
      - 'rm\s+-rf'
      - 'dd\s+if='
      - 'mkfs'
      - 'sudo'
      - 'wget'
      - 'ssh'
      - 'nc\s+-l'
      - ':\(\)\s*\{\s*:\|:&\s*\};:'
    timeout_seconds: 30
    rate_limit_per_hour: 200
    loop_max_per_signature: 5
    loop_max_consecutive: 10
    loop_output_sensitive: true
    loop_consecutive_terminal: true  # FRE-279: unknown commands fail; terminate instead of indefinite retry

  # FRE-188: System diagnostics — subprocess allow-list (ps, lsof, find, iostat, …)
  run_sysdiag:
    category: "read_only"
    allowed_in_modes: ["NORMAL", "ALERT", "DEGRADED"]
