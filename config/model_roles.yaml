# config/model_roles.yaml — ADR-0099 D1 role matrix (stage 2, FRE-650)
#
# The ONE hand-edited home for role→model assignment. Stage 2 makes this
# GENERATIVE: each role carries the actual model-key value, and
# src/personal_agent/config/model_loader.py's resolve_role_model_key()
# resolves every runtime consumer directly from this file. The per-profile
# `<role>_role:` YAML headers stage 1 checked this file against are REMOVED
# (there is no second place a role assignment can live).
#
# ── roles ───────────────────────────────────────────────────────────────────
# FRE-916 phase 2 (ADR-0121) COLLAPSED the divergence axis. `active_profiles`
# and the `divergence: allowed | forbidden` distinction both existed to describe
# how a role could resolve differently across the two model-definition files.
# There is now exactly one catalog (config/models.yaml), so there is no second
# file for an assignment to diverge into: every role has one value, and
# assignment drift is structurally impossible rather than merely policed.
#
# The two `allowed` roles this retired (`primary`, `sub_agent`) already carried
# identical `local:`/`cloud:` values, so the collapse is a no-op in resolution.
# They were also never resolved through this matrix in the first place — they
# route via ExecutionProfile (ADR-0044) and, since ADR-0121, the Layer-3
# bindings below. FRE-917 removes ExecutionProfile itself.
#
# The dangling-reference half of the old guard is RETAINED
# (config_guard.check_forbidden_role_divergence_and_dangling_refs): a role
# pointing at a model key that no longer exists is still a real failure.
#
# ADR-0121 T5 (FRE-920, master gate 2026-07-20): `sub_agent`'s entry here was
# removed — it was never resolved through this matrix (see above), and its
# stale value (`qwen3.6-35b-instruct`) had drifted from the Layer-3 binding
# below, a two-places-for-one-role trap master caught at the gate. `primary`
# stays: its value here still matches its binding, so there is no drift to
# trap, even though this matrix isn't consulted for it either.
#
# Status for the next reader (FRE-926): this matrix is NOT dead weight —
# resolve_role_model_key() (model_loader.py) still reads this `roles:` block
# directly, and several runtime call sites still call it for their role
# (grep `resolve_role_model_key` under src/ before assuming a role here is
# unused; some roles, e.g. `compressor`, resolve through it at one call site
# and through the Layer-3-bindings resolver `resolve_role_target()` at
# another — the split below is not a clean one-or-the-other partition).
# `sub_agent`, `artifact_builder`, and `vision` are the only roles that never
# touch this matrix at all; they exist solely as bindings below. Beyond those
# runtime callers, this matrix is also read by config_guard's
# dangling-reference check (`check_forbidden_role_divergence_and_dangling_refs`).
# Each entry's `all:` key is a vestigial profile-era shape: ADR-0099 originally
# needed it to hold one value per profile when `divergence: allowed`; FRE-916
# phase 2 collapsed that axis to a single catalog, so `all:` now just means
# "the one value" — kept because the loader and the dangling-ref check both
# still read that key name, not because there is anything left to be "all" of.
roles:
  primary:            { all: qwen3.6-35b-thinking }
  entity_extraction:  { all: gpt-5.4-mini }
  captains_log:       { all: claude_sonnet }
  # ADR-0124 D2 (FRE-947): the session summariser's own role. It previously
  # borrowed captains_log, which made "bind the summariser to a deployment whose
  # egress you accept" unactionable — you would have re-bound reflection at the
  # same time. Defaulted to captains_log's current value so introducing the role
  # is an observable no-op (AC-14); the model CHOICE stays deferred.
  session_summary:    { all: claude_sonnet }
  insights:           { all: claude_sonnet }
  embedding:          { all: embedding }
  compressor:         { all: gpt-5.4-mini }
  reranker:           { all: reranker }
  reranker_fallback:  { all: reranker_fallback }

# ── required_secrets ────────────────────────────────────────────────────────
# Per-profile required AppConfig secret fields (ADR-0099 D4: "required secret
# is per-profile, not global"). Checked at AppConfig startup (safety class) —
# fires only when the ACTIVE profile is the one requiring the secret.
#
# Keyed by AGENT_DEPLOYMENT_PROFILE since FRE-916 phase 2. It was previously
# keyed by which catalog file AGENT_MODEL_CONFIG_PATH selected; that variable is
# gone. `eval` is listed explicitly and requires the same set as `cloud`, which
# is what it enforces today — deriving the key from settings.environment instead
# would have silently dropped it, because APP_ENV=eval maps to DEVELOPMENT.
required_secrets:
  local: []
  cloud:
    - anthropic_api_key
    - openai_api_key
  eval:
    - anthropic_api_key
    - openai_api_key

# ── Layer 3 bindings (ADR-0121) ──────────────────────────────────────────────
# Which deployment each role uses, plus its per-use parameters. These point at
# deployment keys in config/models.yaml's `models:` mapping.
#
# `open: true` marks a role a user may select. Absent means pinned — fail-closed,
# so a role added later is never selectable by omission (ADR-0121 §6). Nothing
# consumes it yet; the guardrail is declared before the mechanism that reads it.
bindings:
  primary:            { deployment: qwen3.6-35b-thinking, open: true }
  # No default_timeout override: with a profile active — which is every
  # production request — this role already resolved to the sub_agent
  # deployment's 90s. The 120s only ever appeared on the no-profile path, which
  # raised anyway, and artifact_tools passes its own _draft_timeout_s() at the
  # call site regardless.
  # ADR-0121 T5 (FRE-920): pinned to claude_sonnet — owner-directed 2026-07-20
  # at the master gate (there is only one binding default now that
  # ExecutionProfile is gone, and profile-based redirection no longer
  # applies to either role). artifact_builder's real per-build choice lands
  # with ADR-0122.
  artifact_builder:   { deployment: claude_sonnet, open: true }
  sub_agent:          { deployment: claude_sonnet }
  entity_extraction:  { deployment: gpt-5.4-mini }
  captains_log:       { deployment: claude_sonnet }
  # ADR-0124 D2 (FRE-947): pinned — no `open: true`. The summariser reads full
  # tool payloads unconditionally, so this binding IS the egress decision, and it
  # is the owner's to make once in configuration rather than a user's to flip.
  session_summary:    { deployment: claude_sonnet }
  insights:           { deployment: claude_sonnet }
  compressor:         { deployment: gpt-5.4-mini }
  embedding:          { deployment: embedding }
  reranker:           { deployment: reranker }
  reranker_fallback:  { deployment: reranker_fallback }
  # ADR-0121 T5 (FRE-920): pinned — no user control (ADR-0102 model-coupling).
  # Resolved directly by _resolve_vision_routing_key/_resolve_document_routing_key
  # (orchestrator/executor.py) for any turn carrying a raster image or a
  # Tier-2 PDF, replacing the old profile-escalation logic.
  vision:             { deployment: claude_sonnet }
