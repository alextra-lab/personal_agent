# Model configuration for Local LLM Client (medium-scale variants)
#
# This file defines model configurations for the two-tier taxonomy (ADR-0033).
# PRIMARY = orchestrator brain, SUB_AGENT = focused task completion.
#
# The client automatically tries /v1/responses first, then falls back to /v1/chat/completions
# if the responses endpoint is unavailable.

models:
  primary:
    # Orchestrator brain using a medium-scale reasoning model.
    # Renamed from "reasoning" (ADR-0033).
    id: "qwen/qwen3-next-80b"
    context_length: 40960
    quantization: "8bit"
    min_concurrency: 1
    max_concurrency: 2
    default_timeout: 60  # seconds
    supports_function_calling: true

  sub_agent:
    # Focused sub-task completion.
    # Renamed from "standard" (ADR-0033).
    id: "qwen/qwen3-next-80b"
    context_length: 40960
    quantization: "8bit"
    min_concurrency: 1
    max_concurrency: 2
    default_timeout: 45  # seconds
    supports_function_calling: true

  # EXPERIMENTAL: Alternative models for A/B testing (not loaded by default)
  reasoning_heavy:
    id: "qwen/qwen3-next-80b"
    context_length: 32768
    quantization: "4bit"
    min_concurrency: 1
    max_concurrency: 1
    default_timeout: 90
    supports_function_calling: false

  coding_large_context:
    id: "mistralai/devstral-small-2-2512"
    context_length: 128000
    quantization: "8bit"
    min_concurrency: 1
    max_concurrency: 1
    default_timeout: 60
