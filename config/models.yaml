# Model configuration (ADR-0031: single source of truth for all model identity)
#
# This file owns ALL model parameters — both local (LM Studio) and cloud (Anthropic, OpenAI).
# Only secrets (API keys) and operational controls (budgets) belong in .env / settings.py.
#
# ── Process-to-model assignments ──────────────────────────────────────────────
# Each key below maps a background process to a model role defined in models:
#   entity_extraction_role  →  Second Brain memory graph extraction
#   captains_log_role       →  Captain's Log self-reflection generation
#   insights_role           →  Insights Engine pattern analysis
#
# ── Model definition fields ───────────────────────────────────────────────────
# Required for all models:
#   id               Model identifier (LM Studio slug or provider model name)
#   context_length   Maximum context window in tokens
#   max_concurrency  Max concurrent in-flight requests
#   default_timeout  Request timeout in seconds
#
# Local-model fields (omit for cloud models):
#   endpoint         Base URL override (defaults to settings.llm_base_url)
#   provider_type    "local" | "managed" | "cloud" (ADR-0029; auto-detected if omitted)
#   quantization     e.g. "8bit", "4bit" (omit for cloud models)
#   temperature, top_p, presence_penalty   Sampling params
#   top_k            Passed via extra_body (vLLM/LM Studio extension)
#   disable_thinking Hard-disables thinking via chat_template_kwargs (Qwen3.5+)
#   thinking_budget_tokens  Caps thinking tokens via extra_body (Qwen3.5+)
#
# Cloud-model fields:
#   provider         "anthropic" | "openai"  ← selects which SDK to dispatch to
#   max_tokens       Max output tokens (billed per token; set deliberately)
#   provider_type    "cloud" (set explicitly for ADR-0029 concurrency pass-through)

# ── Process-to-model assignments ──────────────────────────────────────────────
entity_extraction_role: claude_sonnet
captains_log_role: claude_sonnet
insights_role: claude_sonnet

models:
  router:
    id: "lfm2.5-1.2b-instruct-mlx"
    #id: "qwen/qwen3-1.7b"
    context_length: 32768
    quantization: "bf16"
    max_concurrency: 4
    default_timeout: 10  # seconds (1.7B model is fast, typical routing ~3-4s)
    temperature: 0.1
    top_p: 0.1
    top_k: 50
    presence_penalty: 1.05
    supports_function_calling: false
    tool_calling_strategy: "disabled"  # Router never uses tools
    provider_type: "local"
    #endpoint: "http://localhost:8000/v1"  # Optional: override base URL for this model
    endpoint: "http://127.0.0.1:1234/v1"

  standard:
    # Default "workhorse" model: general answers + tool orchestration, non-thinking fast path.
    # disable_thinking sends chat_template_kwargs enable_thinking=False via extra_body (ADR-0023).
    # Sampling params: Qwen3.5 non-thinking mode recommendations.
    id: "qwen/qwen3.5-9b"
    context_length: 32768
    quantization: "8bit"
    max_concurrency: 2
    default_timeout: 45  # seconds
    temperature: 0.7     # Qwen3.5 non-thinking recommended
    top_p: 0.8           # Qwen3.5 non-thinking recommended
    top_k: 20            # Qwen3.5 recommended (passed via extra_body)
    presence_penalty: 1.5  # Reduces repetition in non-thinking mode
    disable_thinking: true  # Hard disable via chat_template_kwargs (ADR-0023)
    supports_function_calling: true
    tool_calling_strategy: "native"  # Qwen3.5 chat template supports tools natively
    provider_type: "local"
    #endpoint: "http://localhost:8000/v1"  # Optional: override base URL for this model
    endpoint: "http://127.0.0.1:1234/v1"

  reasoning:
    # Deep reasoning model with bounded thinking budget (ADR-0023).
    # thinking_budget_tokens caps thinking token spend; sampling params per Qwen3.5 thinking mode.
    id: "qwen/qwen3.5-35b-a3b"
    context_length: 64000  # Optimized from 128K for MVP
    quantization: "8bit"
    max_concurrency: 1  # Increased from 1 (smaller footprint enables parallelism)
    default_timeout: 180  # seconds (35B model: ~40s thinking + ~30s JSON generation)
    temperature: 0.6     # Qwen3.5 thinking mode recommended
    top_p: 0.95          # Qwen3.5 thinking mode recommended
    top_k: 20            # Qwen3.5 recommended (passed via extra_body)
    thinking_budget_tokens: 3000  # Cap thinking tokens to limit over-generation (ADR-0023)
    supports_function_calling: true
    tool_calling_strategy: "native"  # Qwen3.5 chat template supports tools natively
    provider_type: "local"
    #endpoint: "http://localhost:8000/v1"  # Optional: override base URL for this model
    endpoint: "http://127.0.0.1:1234/v1"

  coding:
    # Fallback: devstral not loaded, reuse standard model for coding tasks
    #id: "mistralai/devstral-small-2-2512"
    id: "qwen3.5-9b-claude-4.6-highiq-instruct"
    context_length: 32768
    quantization: "8bit"
    max_concurrency: 1
    default_timeout: 45  # seconds
    temperature: 0.2
    disable_thinking: true
    supports_function_calling: true
    tool_calling_strategy: "native"  # Qwen3.5 chat template supports tools natively
    provider_type: "local"
    #endpoint: "http://localhost:8000/v1"  # Optional: override base URL for this model
    endpoint: "http://127.0.0.1:1234/v1"

  # EXPERIMENTAL: Alternative models for A/B testing (not loaded by default)
  reasoning_heavy:
    # Deep reasoning model with bounded thinking budget (ADR-0023).
    # thinking_budget_tokens caps thinking token spend; sampling params per Qwen3.5 thinking mode.
    id: "qwen3.5-35b-a3b"
    context_length: 64000  # Optimized from 128K for MVP
    quantization: "8bit"
    max_concurrency: 1  # Increased from 1 (smaller footprint enables parallelism)
    default_timeout: 180  # seconds (35B model: ~40s thinking + ~30s JSON generation)
    temperature: 0.6     # Qwen3.5 thinking mode recommended
    top_p: 0.95          # Qwen3.5 thinking mode recommended
    top_k: 20            # Qwen3.5 recommended (passed via extra_body)
    thinking_budget_tokens: 3000  # Cap thinking tokens to limit over-generation (ADR-0023)
    supports_function_calling: true
    provider_type: "local"
    #endpoint: "http://localhost:8000/v1"  # Optional: override base URL for this model
    endpoint: "http://127.0.0.1:1234/v1"

  reasoning_baseline:
    # Deep reasoning model with bounded thinking budget (ADR-0023).
    # thinking_budget_tokens caps thinking token spend; sampling params per Qwen3.5 thinking mode.
    id: "qwen3.5-35b-a3b"
    context_length: 64000  # Optimized from 128K for MVP
    quantization: "8bit"
    max_concurrency: 2  # Increased from 1 (smaller footprint enables parallelism)
    default_timeout: 180  # seconds (35B model: ~40s thinking + ~30s JSON generation)
    temperature: 0.6     # Qwen3.5 thinking mode recommended
    top_p: 0.95          # Qwen3.5 thinking mode recommended
    top_k: 20            # Qwen3.5 recommended (passed via extra_body)
    thinking_budget_tokens: 3000  # Cap thinking tokens to limit over-generation (ADR-0023)
    supports_function_calling: true
    provider_type: "local"
    #endpoint: "http://localhost:8000/v1"  # Optional: override base URL for this model
    endpoint: "http://127.0.0.1:1234/v1"

  coding_large_context:
    # For large codebase analysis (future evaluation; high-memory MoE model)
    id: "qwen/qwen3-coder-next"
    context_length: 128000
    quantization: "4bit"
    max_concurrency: 1
    default_timeout: 60
    temperature: 0.2
    #endpoint: "http://localhost:8000/v1"  # Optional: override base URL for this model

  # ── Cloud models (ADR-0031) ────────────────────────────────────────────────
  # API key is NOT stored here — set AGENT_ANTHROPIC_API_KEY / AGENT_OPENAI_API_KEY in .env
  # provider_type: "cloud" opts out of local GPU concurrency control (ADR-0029)

  claude_sonnet:
    # Anthropic Claude Sonnet — used for background reasoning tasks
    # (entity extraction, Captain's Log reflection, insights analysis)
    #
    # Use the undated alias ("claude-sonnet-4-5") for the latest patch of that
    # minor version, or a pinned dated string once you confirm it's available
    # on your API plan. Update this single ID to switch all three processes.
    id: "claude-sonnet-4-6"
    provider: "anthropic"
    provider_type: "cloud"
    max_tokens: 8192
    context_length: 200000
    max_concurrency: 10
    default_timeout: 60

