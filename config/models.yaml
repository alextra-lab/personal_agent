# Model configuration for Local LLM Client
#
# This file defines model configurations for different roles (router, reasoning, coding).
# Each role maps to a model identifier and configuration.
#
# The client automatically tries /v1/responses first, then falls back to /v1/chat/completions
# if the responses endpoint is unavailable.
#
# Configuration options:
# - id: Model identifier (required)
# - endpoint: Base URL for this model (optional, defaults to settings.llm_base_url)
#   Examples:
#     - "http://localhost:1234/v1" (same provider, uses base_url if omitted)
#     - "http://localhost:8001/v1" (different provider/port)
#     - "http://ollama:11434/v1" (different provider entirely)
# - context_length, quantization, max_concurrency, default_timeout: Model-specific settings
# - temperature, top_p, presence_penalty: Sampling params (top-level OpenAI fields)
# - top_k: Sampling param passed via extra_body (non-standard, vLLM/LM Studio extension)
# - disable_thinking: true/false — hard-disables thinking via chat_template_kwargs extra_body (Qwen3.5+)
# - thinking_budget_tokens: integer — caps thinking token budget via extra_body (Qwen3.5+)

models:
  router:
    id: "lfm2.5-1.2b-instruct-mlx"
    #id: "qwen/qwen3-1.7b"
    context_length: 32768
    quantization: "bf16"
    max_concurrency: 4
    default_timeout: 10  # seconds (1.7B model is fast, typical routing ~3-4s)
    temperature: 0.1
    top_p: 0.1
    top_k: 50
    presence_penalty: 1.05
    supports_function_calling: false 
    #endpoint: "http://localhost:8000/v1"  # Optional: override base URL for this model
    endpoint: "http://127.0.0.1:1234/v1"

  standard:
    # Default "workhorse" model: general answers + tool orchestration, non-thinking fast path.
    # disable_thinking sends chat_template_kwargs enable_thinking=False via extra_body (ADR-0023).
    # Sampling params: Qwen3.5 non-thinking mode recommendations.
    id: "qwen3.5-4b-mlx"
    context_length: 32768
    quantization: "8bit"
    max_concurrency: 2
    default_timeout: 45  # seconds
    temperature: 0.7     # Qwen3.5 non-thinking recommended
    top_p: 0.8           # Qwen3.5 non-thinking recommended
    top_k: 20            # Qwen3.5 recommended (passed via extra_body)
    presence_penalty: 1.5  # Reduces repetition in non-thinking mode
    disable_thinking: true  # Hard disable via chat_template_kwargs (ADR-0023)
    supports_function_calling: true
    #endpoint: "http://localhost:8000/v1"  # Optional: override base URL for this model
    endpoint: "http://127.0.0.1:1234/v1"

  reasoning:
    # Deep reasoning model with bounded thinking budget (ADR-0023).
    # thinking_budget_tokens caps thinking token spend; sampling params per Qwen3.5 thinking mode.
    id: "qwen3.5-9b"
    context_length: 32768  # Optimized from 128K for MVP
    quantization: "8bit"
    max_concurrency: 2  # Increased from 1 (smaller footprint enables parallelism)
    default_timeout: 90  # seconds (increased for entity extraction workload)
    temperature: 0.6     # Qwen3.5 thinking mode recommended
    top_p: 0.95          # Qwen3.5 thinking mode recommended
    top_k: 20            # Qwen3.5 recommended (passed via extra_body)
    thinking_budget_tokens: 2048  # Cap thinking tokens to limit over-generation (ADR-0023)
    supports_function_calling: true
    #endpoint: "http://localhost:8000/v1"  # Optional: override base URL for this model
    endpoint: "http://127.0.0.1:1234/v1"

  coding:
    #id: "qwen/qwen3-coder-30b"
    id: "mistralai/devstral-small-2-2512"
    context_length: 32768
    quantization: "8bit"
    max_concurrency: 2
    default_timeout: 45  # seconds
    temperature: 0.2
    supports_function_calling: false  # Use /v1/chat/completions (LM Studio /responses can be slow for some models)
    #endpoint: "http://localhost:8000/v1"  # Optional: override base URL for this model
    endpoint: "http://127.0.0.1:1234/v1"

  # EXPERIMENTAL: Alternative models for A/B testing (not loaded by default)
  reasoning_heavy:
    # For complex reasoning tasks requiring more capacity
    #id: "qwen/qwen3-30b-a3b"
    id: "qwen/qwen3-next-80b"
    context_length: 32768
    quantization: "4bit"
    max_concurrency: 1
    default_timeout: 90
    temperature: 0.35
    supports_function_calling: false  # Uses text-based tool calls (ADR-0008)
    #endpoint: "http://localhost:8000/v1"  # Optional: override base URL for this model
    endpoint: "http://127.0.0.1:1234/v1"

  reasoning_baseline:
    # Original baseline for comparison experiments
    id: "qwen/qwen3-30b-a3b"
    context_length: 128000
    quantization: "5bit"
    max_concurrency: 1
    default_timeout: 60
    temperature: 0.4
    #endpoint: "http://localhost:8000/v1"  # Optional: override base URL for this model

  coding_large_context:
    # For large codebase analysis (future evaluation; high-memory MoE model)
    id: "qwen/qwen3-coder-next"
    context_length: 128000
    quantization: "4bit"
    max_concurrency: 1
    default_timeout: 60
    temperature: 0.2
    #endpoint: "http://localhost:8000/v1"  # Optional: override base URL for this model
