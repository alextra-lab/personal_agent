# Model configuration (ADR-0031 + ADR-0033: two-tier taxonomy + LiteLLM)
#
# ── Model Taxonomy (ADR-0033) ──────────────────────────────────────
#   PRIMARY:    Orchestrator brain (reasoning, tool calling, decomposition)
#   SUB_AGENT:  Focused task completion (no thinking, fast, bounded output)
#
# ── Rules (ADR-0031) ───────────────────────────────────────────────
#   "Which model does X use?"  → This file (role assignment + model def)
#   "What is my API key?"      → .env (secret, gitignored)
#   "How much can I spend?"    → .env (operational runtime control)
#
# ── Model definition fields ───────────────────────────────────────────────────
# Required for all models:
#   id               Model identifier (LM Studio slug or provider model name)
#   context_length   Maximum context window in tokens
#   max_concurrency  Max concurrent in-flight requests
#   default_timeout  Request timeout in seconds
#
# Local-model fields (omit for cloud models):
#   endpoint         Base URL override (defaults to settings.llm_base_url)
#   provider_type    "local" | "managed" | "cloud" (ADR-0029; auto-detected if omitted)
#   quantization     e.g. "8bit", "4bit" (omit for cloud models)
#   temperature, top_p, presence_penalty   Sampling params
#   top_k            Passed via extra_body (vLLM/LM Studio extension)
#   disable_thinking Hard-disables thinking via chat_template_kwargs (Qwen3.5+)
#   thinking_budget_tokens  Caps thinking tokens via extra_body (Qwen3.5+)
#   parallel_tool_calls     Allow multiple tool calls per turn (default true; requires updated llama.cpp)
#   min_concurrency  Floor for adaptive concurrency (ADR-0033)
#
# Cloud-model fields:
#   provider         "anthropic" | "openai"  ← selects which SDK to dispatch to
#   max_tokens       Max output tokens (billed per token; set deliberately)
#   provider_type    "cloud" (set explicitly for ADR-0029 concurrency pass-through)

# ── Process-to-model assignments ──────────────────────────────────────────────
entity_extraction_role: gpt-5.4-nano
captains_log_role: gpt-5.4-nano
insights_role: gpt-5.4-nano
# captains_log_role: claude_sonnet
# insights_role: claude_sonnet

models:
  # ── Tier 1: Primary Agent ───────────────────────────────────────
  primary:
    # Orchestrator brain: deep reasoning, tool calling, decomposition planning.
    # Thinking enabled with bounded budget. Single concurrent (GPU-limited).
    # Renamed from "reasoning" (ADR-0033).
    # Sampling per the Qwen3.6-35B-A3B HuggingFace model card,
    # "Thinking Mode — General Tasks" preset. The card requires context >= 128K
    # to preserve thinking capability across multi-turn agent loops.
    id: "unsloth/qwen3.6-35-A3B"
    context_length: 131072       # Qwen card: thinking-mode minimum (was 64000)
    quantization: "8bit"
    min_concurrency: 1
    max_concurrency: 1
    default_timeout: 600         # 128K prefill + up to 32K thinking output (was 180)
    temperature: 0.6             # Qwen3.5 carryover; outperforms card's 1.0 on our agent loop (deterministic intent + bounded tool iterations). See EVAL-2026-05-11-subagent-qwen36 COMPARISON.
    top_p: 0.95
    top_k: 20                    # via extra_body
    min_p: 0.0                   # Qwen card recommended; via extra_body
    presence_penalty: 1.5        # Qwen card recommended for thinking
    repetition_penalty: 1.0      # Qwen card default; via extra_body
    thinking_budget_tokens: 32768  # Qwen card "standard" max output
    supports_function_calling: true
    supports_vision: true         # Qwen3.6-35B-A3B vision-capable on the deployed build (ADR-0101)
    tool_calling_strategy: "native"  # Qwen3.5/3.6 chat template supports tools natively
    provider_type: "local"
    endpoint: "http://localhost:8000/v1"

  # ── Tier 2: Sub-Agent ───────────────────────────────────────────
  sub_agent:
    # Focused single-task completion for HYBRID expansion sub-agents.
    # Second instance of Qwen3.6-35B-A3B, served with thinking disabled
    # and a smaller context window. MoE (~3B active) outperforms the
    # Qwen3.5-9B-8bit dense it replaced — same family as primary, llama.cpp
    # toolchain (no MLX), better quality.
    # Sampling per the Qwen3.6 card "Instruct (Non-Thinking) Mode" preset.
    id: "unsloth/qwen3.6-35-A3B-subagent"
    context_length: 32768       # Bumped for artifact HTML generation (ADR-0077); was 16384
    quantization: "8bit"
    min_concurrency: 1
    max_concurrency: 3
    default_timeout: 90          # Fail-fast — sub-agent delays cascade to primary
    temperature: 0.7             # Qwen card Instruct preset (was 0.4 for Qwen3.5-9B)
    top_p: 0.80                  # Qwen card Instruct
    top_k: 20
    min_p: 0.0                   # Qwen card Instruct (new)
    presence_penalty: 1.5        # Qwen card Instruct (was 0.5)
    repetition_penalty: 1.0      # Qwen card Instruct (new); via extra_body
    max_tokens: 2048             # Bounded output for summary-length sub-task results
    disable_thinking: true       # Hard disable via chat_template_kwargs (ADR-0023)
    supports_function_calling: true
    supports_vision: true         # Qwen3.6-35B-A3B vision-capable on the deployed build (ADR-0101)
    tool_calling_strategy: "native"  # Qwen3.6 chat template supports tools natively
    provider_type: "local"
    endpoint: "http://localhost:8000/v1"

  # ── Experimental / A/B Testing ──────────────────────────────────
  reasoning_heavy:
    # Deep reasoning model with bounded thinking budget (ADR-0023).
    id: "qwen3.6-35b-a3b"
    context_length: 64000
    quantization: "8bit"
    min_concurrency: 1
    max_concurrency: 1
    default_timeout: 180
    temperature: 0.6
    top_p: 0.95
    top_k: 20
    thinking_budget_tokens: 3000
    supports_function_calling: true
    provider_type: "local"
    endpoint: "http://localhost:8000/v1"

  coding_large_context:
    # For large codebase analysis (future evaluation; high-memory MoE model)
    id: "qwen/qwen3-coder-next"
    context_length: 128000
    quantization: "4bit"
    min_concurrency: 1
    max_concurrency: 1
    default_timeout: 60
    temperature: 0.2

  # ── Cloud Models (ADR-0031) ─────────────────────────────────────
  # API key is NOT stored here — set AGENT_ANTHROPIC_API_KEY / AGENT_OPENAI_API_KEY in .env
  # provider_type: "cloud" opts out of local GPU concurrency control (ADR-0029)

  claude_sonnet:
    # Anthropic Claude Sonnet — used for background reasoning tasks
    # (entity extraction, Captain's Log reflection, insights analysis)
    # LiteLLM model string: "anthropic/claude-sonnet-4-6" (prefixed at call time)
    id: "claude-sonnet-4-6"
    provider: "anthropic"
    provider_type: "cloud"
    max_tokens: 32768
    context_length: 200000
    min_concurrency: 1
    max_concurrency: 10
    default_timeout: 180
    supports_vision: true         # Claude Sonnet is vision-capable (ADR-0101)
    input_cost_per_token: 0.000003    # $3/MTok (ADR-0101 §8b / FRE-691 — config-owned cost matrix)
    output_cost_per_token: 0.000015   # $15/MTok

  claude_haiku:
    # Anthropic Claude Haiku — fast, low-cost sub-agent model for cloud profile
    # Used as sub_agent_model in config/profiles/cloud.yaml
    id: "claude-haiku-4-5-20251001"
    provider: "anthropic"
    provider_type: "cloud"
    max_tokens: 4096
    context_length: 200000
    min_concurrency: 1
    max_concurrency: 20
    default_timeout: 30
    supports_vision: true         # Claude Haiku is vision-capable (ADR-0101)
    input_cost_per_token: 0.000001    # $1/MTok (ADR-0101 §8b / FRE-691 — config-owned cost matrix)
    output_cost_per_token: 0.000005   # $5/MTok

  gpt-5.4-nano:
    # OpenAI GPT-5.4 Nano — entity extraction, structured output tasks
    # Cheapest cloud model with strong structured output quality
    # Pricing: $0.20/$1.25 per MTok (input/output)
    id: "gpt-5.4-nano"
    provider: "openai"
    provider_type: "cloud"
    max_tokens: 4096
    context_length: 128000
    min_concurrency: 1
    max_concurrency: 10
    default_timeout: 60

  gpt-5.4-mini:
    # OpenAI GPT-5.4 Mini — higher-quality background reasoning
    # Pricing: $0.75/$4.50 per MTok (input/output)
    id: "gpt-5.4-mini"
    provider: "openai"
    provider_type: "cloud"
    max_tokens: 8192
    context_length: 128000
    min_concurrency: 1
    max_concurrency: 10
    default_timeout: 60

  # ── Tier 3: Context Compressor (ADR-0038) ────────────────────────
  compressor:
    # Lightweight summarization of evicted context turns.
    # Runs asynchronously between turns when token threshold is crossed.
    # Cloud nano chosen for: low cost ($0.20/$1.25/MTok), strong structured
    # output, high concurrency (no GPU contention with local primary).
    id: "gpt-5.4-nano"
    provider: "openai"
    provider_type: "cloud"
    max_tokens: 512
    context_length: 128000
    min_concurrency: 1
    max_concurrency: 5
    default_timeout: 30

  # ── Embedding Model (Seshat Memory — ADR-0035) ─────────────────
  embedding:
    # Qwen3-Embedding-0.6B via slm_server (llama.cpp GGUF)
    # Instruction-aware, Matryoshka (flexible dims), 768d default
    # One-way door: changing model requires rebuilding all Neo4j vectors
    id: "Qwen/Qwen3-Embedding-0.6B"
    provider_type: "local"
    endpoint: "http://localhost:8503/v1"
    context_length: 32768
    max_concurrency: 1
    default_timeout: 60
    supports_function_calling: false

  # ── Reranker Model (Seshat Memory — ADR-0035) ──────────────────
  reranker:
    # Qwen3-Reranker-0.6B via slm_server (llama.cpp GGUF, /v1/rerank)
    # Cross-attention re-scoring of top-K retrieval candidates
    id: "ggml-org/Qwen3-Reranker-0.6B-Q8_0-GGUF"
    provider_type: "local"
    endpoint: "http://localhost:8504/v1"
    context_length: 8192
    max_concurrency: 1
    default_timeout: 120
    supports_function_calling: false

  # gemini_pro:
  #   # Google Gemini 2.5 Pro — deep research / long-context
  #   # LiteLLM model string: "gemini/gemini-2.5-pro"
  #   id: "gemini-2.5-pro"
  #   provider: "google"
  #   provider_type: "cloud"
  #   max_tokens: 8192
  #   context_length: 1000000
  #   min_concurrency: 1
