name: local
description: "Local inference via SLM Server (Qwen3.6-35B-A3B)"
primary_model: qwen3.6-35b-thinking
sub_agent_model: qwen3.6-35b-instruct
# artifact_builder (ADR-0118 T1, FRE-879): stays on the local sub_agent model — an open role
# resolved via this ExecutionProfile (ADR-0119 §2), never config/model_roles.yaml, so a
# local-profile build never silently crosses to cloud Haiku (ADR-0119 AC-8).
artifact_builder_model: qwen3.6-35b-instruct
provider_type: local
cost_limit_per_session: null  # No cost limit for local
delegation:
  allow_cloud_escalation: false
  # escalation_model is used by: (1) the explicit per-attachment "cloud"
  # processing_target override (ADR-0101 §8a), and (2) as of FRE-886, the
  # Auto/no-override default too — attachment_default_processing_target
  # defaults to "cloud" (settings.py), which deliberately supersedes
  # allow_cloud_escalation for attachments specifically (the local Qwen vision
  # path read scanned pages worse than cloud Sonnet). allow_cloud_escalation
  # only still matters if attachment_default_processing_target is flipped
  # back to "local" (then it gates escalation for an incapable local model,
  # same as before FRE-886).
  escalation_provider: anthropic
  escalation_model: claude_sonnet
