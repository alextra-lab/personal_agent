# Cloud Deployment Docker Compose — OVH VPS-3
#
# Production topology for the Seshat API Gateway and supporting services.
# Resource limits are conservative; VPS-3 (24GB RAM, 8 vCPU) provides headroom.
#
# Services:
# - PostgreSQL (pgvector): 512MB RAM, 0.5 CPU
# - Neo4j Community: 1536MB RAM, 1.0 CPU
# - Elasticsearch: 2048MB RAM, 1.0 CPU
# - Redis: 128MB RAM, 0.25 CPU
# - Seshat API Gateway: 256MB RAM, 0.5 CPU
# - Caddy reverse proxy: 64MB RAM, 0.25 CPU
#
# Network: cloud-sim (isolated bridge network)
# All services communicate via internal DNS. Debug ports are bound to 127.0.0.1
# only (SSH tunnel to access). Only Caddy exposes 80 and 443 externally.

services:
  # PostgreSQL 17 with pgvector extension
  # Purpose: Sessions, metrics, conversation history, embeddings
  # Resource limit: 512MB RAM, 0.5 CPU
  postgres:
    image: pgvector/pgvector:pg17
    container_name: cloud-sim-postgres
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required — set in .env}
      POSTGRES_DB: personal_agent
    volumes:
      - postgres_data_cloud:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      # Localhost only — use SSH tunnel to access: ssh -L 5432:localhost:5432 vps-5a0f676b
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d personal_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 512m
    cpus: 0.5
    networks:
      - cloud-sim
    restart: unless-stopped

  # Neo4j 5.26 Community Edition
  # Purpose: Knowledge graph, entity relationships, memory consolidation
  # Resource limit: 1536MB RAM, 1.0 CPU
  # Heap: 1GB max, pagecache: 256MB
  neo4j:
    image: neo4j:5.26-community
    container_name: cloud-sim-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?NEO4J_PASSWORD required — set in .env}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_usage__report_enabled: "false"
      NEO4J_dbms_security_allow__csv__import__from__file__urls: "true"
      # Memory configuration for cloud footprint
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 256m
    volumes:
      - neo4j_data_cloud:/data
    ports:
      # Localhost only — use SSH tunnel: ssh -L 7474:localhost:7474 -L 7687:localhost:7687 vps-5a0f676b
      - "127.0.0.1:7474:7474"  # HTTP Browser
      - "127.0.0.1:7687:7687"  # Bolt Driver
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    mem_limit: 1536m
    cpus: 1.0
    networks:
      - cloud-sim
    restart: unless-stopped

  # Elasticsearch 8.19
  # Purpose: Logs, traces, indexed knowledge, telemetry
  # Resource limit: 2048MB RAM, 1.0 CPU
  # JVM heap: 512MB min, 1GB max
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.0
    container_name: cloud-sim-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      # Tight JVM memory constraints for cloud footprint
      - "ES_JAVA_OPTS=-Xms512m -Xmx1g"
    volumes:
      - es_data_cloud:/usr/share/elasticsearch/data
    ports:
      # Localhost only — use SSH tunnel: ssh -L 9200:localhost:9200 vps-5a0f676b
      - "127.0.0.1:9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 2048m
    cpus: 1.0
    networks:
      - cloud-sim
    restart: unless-stopped

  # Redis 7 (Alpine)
  # Purpose: Event bus (Redis Streams), session cache, rate limiting
  # Resource limit: 128MB RAM, 0.25 CPU
  redis:
    image: redis:7-alpine
    container_name: cloud-sim-redis
    ports:
      # Localhost only — use SSH tunnel: ssh -L 6379:localhost:6379 vps-5a0f676b
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data_cloud:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    mem_limit: 128m
    cpus: 0.25
    networks:
      - cloud-sim
    restart: unless-stopped
    command: redis-server --appendonly yes

  # llama.cpp — Embedding + Reranker server
  # Purpose: Serves Qwen3-Embedding-0.6B (port 8503) and Qwen3-Reranker-0.6B (port 8504)
  # Models are mounted from the host at /opt/seshat/models/ (populated by transfer-models.sh)
  # Resource limit: embeddings 3000MB / reranker 2560MB, 4 CPU each
  #
  # To set up models on VPS before first deploy:
  #   bash infrastructure/scripts/transfer-models.sh
  embeddings:
    build:
      context: .
      dockerfile: Dockerfile.llmserver
    image: llmserver:latest
    container_name: cloud-sim-embeddings
    command:
      - "-m"
      - "/models/embedding/Qwen3-Embedding-0.6B-f16.gguf"
      - "--embedding"
      - "--pooling"
      - "last"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8503"
      - "--ctx-size"
      - "8192"
      - "--threads"
      - "4"
    volumes:
      - /opt/seshat/models:/models:ro
    ports:
      - "127.0.0.1:8503:8503"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8503/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_limit: 3000m
    cpus: 4.0
    networks:
      - cloud-sim
    restart: unless-stopped

  reranker:
    build:
      context: .
      dockerfile: Dockerfile.llmserver
    image: llmserver:latest
    container_name: cloud-sim-reranker
    command:
      - "-m"
      - "/models/reranker/qwen3-reranker-0.6b-q8_0.gguf"
      - "--reranking"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8504"
      - "--ctx-size"
      - "8192"
      - "--ubatch-size"
      - "1024"
      - "--parallel"
      - "1"
      - "--threads"
      - "4"
    volumes:
      - /opt/seshat/models:/models:ro
    ports:
      - "127.0.0.1:8504:8504"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8504/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_limit: 2560m
    cpus: 4.0
    networks:
      - cloud-sim
    restart: unless-stopped

  # SearXNG metasearch engine for private web search (ADR-0034)
  # Purpose: Private web search aggregating Google, Brave, DuckDuckGo, etc.
  # Resource limit: 256MB RAM, 0.5 CPU
  searxng:
    image: searxng/searxng:latest
    container_name: cloud-sim-searxng
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080
    volumes:
      - ./docker/searxng:/etc/searxng:rw
    ports:
      # Localhost only — use SSH tunnel: ssh -L 8888:localhost:8888 vps-5a0f676b
      - "127.0.0.1:8888:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 256m
    cpus: 0.5
    networks:
      - cloud-sim
    restart: unless-stopped

  # Seshat API Gateway (FastAPI)
  # Purpose: Full agent harness — Knowledge API, Observation API, orchestration
  # Depends on: postgres, neo4j, elasticsearch, redis, embeddings, reranker, searxng
  # Resource limit: 512MB RAM, 1.0 CPU (increased for full harness)
  seshat-gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: cloud-sim-seshat-gateway
    environment:
      # All settings use AGENT_ prefix (see config/settings.py env_prefix)
      AGENT_DATABASE_URL: postgresql+asyncpg://agent:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required — set in .env}@postgres:5432/personal_agent
      AGENT_NEO4J_URI: bolt://neo4j:7687
      AGENT_NEO4J_USER: neo4j
      AGENT_NEO4J_PASSWORD: ${NEO4J_PASSWORD:?NEO4J_PASSWORD required — set in .env}
      AGENT_ELASTICSEARCH_URL: http://elasticsearch:9200
      AGENT_EVENT_BUS_REDIS_URL: redis://redis:6379/0
      AGENT_ENABLE_MEMORY_GRAPH: "${AGENT_ENABLE_MEMORY_GRAPH:-true}"
      AGENT_EVENT_BUS_ENABLED: "${AGENT_EVENT_BUS_ENABLED:-true}"
      AGENT_ENABLE_SECOND_BRAIN: "${AGENT_ENABLE_SECOND_BRAIN:-true}"
      AGENT_SECOND_BRAIN_RESOURCE_GATING_ENABLED: "${AGENT_SECOND_BRAIN_RESOURCE_GATING_ENABLED:-false}"
      AGENT_PROACTIVE_MEMORY_ENABLED: "${AGENT_PROACTIVE_MEMORY_ENABLED:-true}"
      AGENT_FRESHNESS_ENABLED: "${AGENT_FRESHNESS_ENABLED:-true}"
      AGENT_MCP_GATEWAY_ENABLED: "true"
      AGENT_MCP_GATEWAY_COMMAND: '["/app/docker/mcp/run-gateway.sh"]'
      AGENT_MCP_GATEWAY_ENABLED_SERVERS: "${AGENT_MCP_GATEWAY_ENABLED_SERVERS:-[\"sequentialthinking\", \"context7\"]}"
      AGENT_MCP_GATEWAY_TIMEOUT_SECONDS: "${AGENT_MCP_GATEWAY_TIMEOUT_SECONDS:-90}"
      # Host path of MCP secrets .env — must exist on VPS before first deploy.
      # See docker/mcp/mcp-secrets.env.example → copy to /opt/seshat/mcp-secrets.env on host.
      MCP_SECRETS_FILE: "${MCP_SECRETS_FILE:-/opt/seshat/mcp-secrets.env}"
      AGENT_GATEWAY_AUTH_ENABLED: "true"
      # Gateway bearer tokens — must match config/gateway_access.yaml secrets
      GATEWAY_TOKEN_PWA: ${GATEWAY_TOKEN_PWA}
      GATEWAY_TOKEN_EXTERNAL_AGENT: ${GATEWAY_TOKEN_EXTERNAL_AGENT}
      # Cloudflare Access service token for Mac SLM tunnel (local inference profile)
      # env_prefix="AGENT_" is applied by pydantic-settings, so container var must have prefix
      AGENT_CF_ACCESS_CLIENT_ID: ${CF_ACCESS_CLIENT_ID}
      AGENT_CF_ACCESS_CLIENT_SECRET: ${CF_ACCESS_CLIENT_SECRET}
      # Use cloud model config (embedding/reranker point to Docker service hostnames)
      AGENT_MODEL_CONFIG_PATH: "${AGENT_MODEL_CONFIG_PATH:-/app/config/models.cloud.yaml}"
      # Cloud LLM API keys (injected from VPS .env)
      AGENT_ANTHROPIC_API_KEY: ${AGENT_ANTHROPIC_API_KEY}
      AGENT_OPENAI_API_KEY: ${AGENT_OPENAI_API_KEY}
      AGENT_PERPLEXITY_API_KEY: ${AGENT_PERPLEXITY_API_KEY}
      AGENT_LINEAR_API_KEY: ${AGENT_LINEAR_API_KEY}
      # API configuration
      API_HOST: 0.0.0.0
      API_PORT: "9001"
      APP_ENV: production
      # Logging
      AGENT_LOG_LEVEL: "${AGENT_LOG_LEVEL:-info}"
      AGENT_SEARXNG_BASE_URL: http://searxng:8080
    ports:
      # Localhost only — Caddy proxies to this port internally
      - "127.0.0.1:9001:9001"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      embeddings:
        condition: service_healthy
      reranker:
        condition: service_healthy
      searxng:
        condition: service_healthy
    volumes:
      # Docker socket — allows run-gateway.sh to spawn docker/mcp-gateway container
      - /var/run/docker.sock:/var/run/docker.sock
      # Persist Captain's Log captures across container restarts/redeployments.
      # Without this, every deploy wipes the capture history and the consolidation
      # pipeline has nothing to process until new captures accumulate.
      - seshat_captures_cloud:/app/telemetry/captains_log/captures
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    mem_limit: 768m
    cpus: 1.0
    networks:
      - cloud-sim
    restart: unless-stopped

  # Seshat PWA (Next.js)
  # Purpose: Mobile-first chat UI served via Caddy
  # Bakes NEXT_PUBLIC_SESHAT_URL=http://172.25.0.10 at build time
  # Resource limit: 256MB RAM, 0.5 CPU
  seshat-pwa:
    build:
      context: .
      dockerfile: Dockerfile.pwa
      args:
        NEXT_PUBLIC_SESHAT_URL: "https://agent.frenchforet.com"
        NEXT_PUBLIC_GATEWAY_TOKEN: ${GATEWAY_TOKEN_PWA}
    container_name: cloud-sim-seshat-pwa
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      seshat-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    mem_limit: 256m
    cpus: 0.5
    networks:
      cloud-sim:
        ipv4_address: 172.25.0.11
    restart: unless-stopped

  # Caddy reverse proxy
  # Purpose: TLS termination (localhost SSH access) + HTTP entry point (WARP private network)
  # Resource limit: 64MB RAM, 0.25 CPU
  # Static IP 172.25.0.10 — stable address for WARP private network routing
  caddy:
    image: caddy:2-alpine
    container_name: cloud-sim-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/cloud-sim/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      seshat-gateway:
        condition: service_healthy
      seshat-pwa:
        condition: service_healthy
    healthcheck:
      # Caddy admin API (port 2019) — avoids TLS cert issues in healthcheck
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:2019/config/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    mem_limit: 64m
    cpus: 0.25
    networks:
      cloud-sim:
        ipv4_address: 172.25.0.12
    restart: unless-stopped

  # Cloudflare Tunnel — WARP private network access
  # Purpose: Connects VPS Docker network to Cloudflare Zero Trust
  # WARP devices route 172.25.0.0/16 through this tunnel → reach Caddy at 172.25.0.10
  # Token stored in .env as CLOUDFLARE_TUNNEL_TOKEN (never committed)
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloud-sim-cloudflared
    # Force HTTP/2 over TCP — QUIC (UDP) is blocked by OVH firewall
    command: tunnel --no-autoupdate --protocol http2 run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - cloud-sim
    restart: unless-stopped
    depends_on:
      caddy:
        condition: service_healthy

volumes:
  # PostgreSQL data (persisted)
  postgres_data_cloud:
    driver: local

  # Neo4j data (persisted)
  neo4j_data_cloud:
    driver: local

  # Elasticsearch data (persisted)
  es_data_cloud:
    driver: local

  # Redis data (persisted)
  redis_data_cloud:
    driver: local

  # Caddy data and config (persisted)
  caddy_data:
    driver: local
  caddy_config:
    driver: local

  # Captain's Log captures (persisted across container restarts)
  seshat_captures_cloud:
    driver: local

networks:
  # Isolated bridge network for cloud simulation
  # Mimics the VPS internal network
  cloud-sim:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
