# Cloud Deployment Docker Compose — OVH VPS-3
#
# Production topology for the Seshat API Gateway and supporting services.
# Resource limits are conservative; VPS-3 (24GB RAM, 8 vCPU) provides headroom.
#
# Services:
# - PostgreSQL (pgvector): 512MB RAM, 0.5 CPU
# - Neo4j Community: 1536MB RAM, 1.0 CPU
# - Elasticsearch: 2048MB RAM, 1.0 CPU
# - Redis: 128MB RAM, 0.25 CPU
# - Seshat API Gateway: 256MB RAM, 0.5 CPU
# - Caddy reverse proxy: 64MB RAM, 0.25 CPU
#
# Network: cloud-sim (isolated bridge network)
# All services communicate via internal DNS. Debug ports are bound to 127.0.0.1
# only (SSH tunnel to access). Only Caddy exposes 80 and 443 externally.

services:
  # PostgreSQL 17 with pgvector extension
  # Purpose: Sessions, metrics, conversation history, embeddings
  # Resource limit: 512MB RAM, 0.5 CPU
  postgres:
    image: pgvector/pgvector:pg17
    container_name: cloud-sim-postgres
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloud_sim_password}
      POSTGRES_DB: personal_agent
    volumes:
      - postgres_data_cloud:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      # Localhost only — use SSH tunnel to access: ssh -L 5432:localhost:5432 vps-5a0f676b
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d personal_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 512m
    cpus: 0.5
    networks:
      - cloud-sim
    restart: unless-stopped

  # Neo4j 5.26 Community Edition
  # Purpose: Knowledge graph, entity relationships, memory consolidation
  # Resource limit: 1536MB RAM, 1.0 CPU
  # Heap: 1GB max, pagecache: 256MB
  neo4j:
    image: neo4j:5.26-community
    container_name: cloud-sim-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-cloud_sim_password}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_usage__report_enabled: "false"
      NEO4J_dbms_security_allow__csv__import__from__file__urls: "true"
      # Memory configuration for cloud footprint
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 256m
    volumes:
      - neo4j_data_cloud:/data
    ports:
      # Localhost only — use SSH tunnel: ssh -L 7474:localhost:7474 -L 7687:localhost:7687 vps-5a0f676b
      - "127.0.0.1:7474:7474"  # HTTP Browser
      - "127.0.0.1:7687:7687"  # Bolt Driver
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    mem_limit: 1536m
    cpus: 1.0
    networks:
      - cloud-sim
    restart: unless-stopped

  # Elasticsearch 8.19
  # Purpose: Logs, traces, indexed knowledge, telemetry
  # Resource limit: 2048MB RAM, 1.0 CPU
  # JVM heap: 512MB min, 1GB max
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.0
    container_name: cloud-sim-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      # Tight JVM memory constraints for cloud footprint
      - "ES_JAVA_OPTS=-Xms512m -Xmx1g"
    volumes:
      - es_data_cloud:/usr/share/elasticsearch/data
    ports:
      # Localhost only — use SSH tunnel: ssh -L 9200:localhost:9200 vps-5a0f676b
      - "127.0.0.1:9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 2048m
    cpus: 1.0
    networks:
      - cloud-sim
    restart: unless-stopped

  # Redis 7 (Alpine)
  # Purpose: Event bus (Redis Streams), session cache, rate limiting
  # Resource limit: 128MB RAM, 0.25 CPU
  redis:
    image: redis:7-alpine
    container_name: cloud-sim-redis
    ports:
      # Localhost only — use SSH tunnel: ssh -L 6379:localhost:6379 vps-5a0f676b
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data_cloud:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    mem_limit: 128m
    cpus: 0.25
    networks:
      - cloud-sim
    restart: unless-stopped
    command: redis-server --appendonly yes

  # Seshat API Gateway (FastAPI)
  # Purpose: Knowledge + Observation APIs served over HTTPS
  # Depends on: postgres, neo4j, elasticsearch, redis
  # Resource limit: 256MB RAM, 0.5 CPU
  #
  # NOTE: This container depends on personal_agent.gateway.app:create_gateway_app
  # which is created by FRE-206. For now, this is a template Dockerfile that will
  # be built once the gateway app is ready.
  seshat-gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: cloud-sim-seshat-gateway
    environment:
      # All settings use AGENT_ prefix (see config/settings.py env_prefix)
      AGENT_DATABASE_URL: postgresql+asyncpg://agent:${POSTGRES_PASSWORD:-cloud_sim_password}@postgres:5432/personal_agent
      AGENT_NEO4J_URI: bolt://neo4j:7687
      AGENT_NEO4J_USER: neo4j
      AGENT_NEO4J_PASSWORD: ${NEO4J_PASSWORD:-cloud_sim_password}
      AGENT_ELASTICSEARCH_URL: http://elasticsearch:9200
      AGENT_EVENT_BUS_REDIS_URL: redis://redis:6379/0
      AGENT_ENABLE_MEMORY_GRAPH: "true"
      AGENT_GATEWAY_AUTH_ENABLED: "false"
      # API configuration
      API_HOST: 0.0.0.0
      API_PORT: "9001"
      # Logging
      AGENT_LOG_LEVEL: info
    ports:
      # Localhost only — Caddy proxies to this port internally
      - "127.0.0.1:9001:9001"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9001/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    mem_limit: 256m
    cpus: 0.5
    networks:
      - cloud-sim
    restart: unless-stopped

  # Caddy reverse proxy
  # Purpose: TLS termination, API gateway, rate limiting
  # Resource limit: 64MB RAM, 0.25 CPU
  # Serves localhost with self-signed certificate for local testing
  caddy:
    image: caddy:2-alpine
    container_name: cloud-sim-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/cloud-sim/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      seshat-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    mem_limit: 64m
    cpus: 0.25
    networks:
      - cloud-sim
    restart: unless-stopped

volumes:
  # PostgreSQL data (persisted)
  postgres_data_cloud:
    driver: local

  # Neo4j data (persisted)
  neo4j_data_cloud:
    driver: local

  # Elasticsearch data (persisted)
  es_data_cloud:
    driver: local

  # Redis data (persisted)
  redis_data_cloud:
    driver: local

  # Caddy data and config (persisted)
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  # Isolated bridge network for cloud simulation
  # Mimics the VPS internal network
  cloud-sim:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
