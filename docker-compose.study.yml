# FRE-838 — ADR-0114 D1: isolated study substrate for the heterarchical
# associative-memory research study (decoupled research, NOT a prod change).
#
# A separate Neo4j instance (own container, volume, network, credentials)
# with the Graph Data Science plugin, seeded from a one-time frozen export
# of the prod KG. Never joined to `cloud-sim` or any prod/test/eval network
# — containers on `seshat-study-net` cannot resolve prod compose service
# names and cannot reach the host's prod-published ports (see
# scripts/study/verify_isolation.py). FRE-375 substrate-isolation line
# applies unchanged: this stack never touches prod Neo4j/ES/Postgres except
# as a read-only source for the one-time export script.
#
# Usage:
#
#   make study-infra-up      # start (Neo4j+GDS on :7691 bolt / :7478 http)
#   make study-infra-down    # stop
#   make study-infra-reset   # stop + wipe volume
#   make study-infra-ps      # status
#
# Requires STUDY_NEO4J_PASSWORD in the environment (.env) — distinct from
# NEO4J_PASSWORD (prod) by design, so the study substrate never shares a
# credential with prod.

services:
  neo4j-study:
    image: neo4j:5.26-community
    container_name: seshat-neo4j-study
    environment:
      NEO4J_AUTH: neo4j/${STUDY_NEO4J_PASSWORD:?STUDY_NEO4J_PASSWORD required}
      NEO4J_PLUGINS: '["graph-data-science"]'
      NEO4J_dbms_usage__report_enabled: "false"
      # FRE-838 fix-forward: the real prod corpus (10,290 nodes / 34,301
      # relationships) memory-killed the study Neo4j at the original 1.5g
      # mem_limit / 1g heap during master's first live corpus-load attempt
      # (2026-07-10) — 1g heap plus the GDS plugin left no room to write
      # that volume (a slow, unindexed relationship-write pattern also
      # contributed — fixed separately in scripts/study/export_snapshot.py).
      # Bumped to a 4g ceiling; `free -h` on the box at fix time showed
      # ~15GB "available" (22GB total) — this container's mem_limit is a
      # hard cap Docker enforces on demand, not a static reservation, so it
      # only matters if the container actually approaches that ceiling.
      # Verified end-to-end against a prod-scale synthetic corpus this
      # session (tests/scripts/study/test_export_snapshot_scale.py) —
      # peak usage settled around 2GB, well under the cap.
      NEO4J_server_memory_heap_max__size: 2g
      NEO4J_server_memory_pagecache_size: 512m
    volumes:
      - seshat_neo4j_study:/data
    ports:
      - "127.0.0.1:7478:7474"  # HTTP Browser (study)
      - "127.0.0.1:7691:7687"  # Bolt Driver (study)
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 4g
    cpus: 1.0
    networks:
      - study-net
    restart: "no"

networks:
  study-net:
    name: seshat-study-net
    driver: bridge

volumes:
  seshat_neo4j_study:
    name: seshat_neo4j_study
