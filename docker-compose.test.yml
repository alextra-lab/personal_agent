# FRE-375 — Isolated test substrate.
#
# Provides a second set of Postgres, Elasticsearch, and Neo4j instances
# exclusively for the test suite. Completely isolated from the default
# docker-compose.yml services (different ports, different volumes).
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d   # start test infra
#   docker compose -f docker-compose.test.yml down     # stop + remove containers
#   docker compose -f docker-compose.test.yml down -v  # also remove volumes (reset)
#
# Ports (all listen on 127.0.0.1 only):
#   postgres-test        127.0.0.1:5433 → 5432
#   elasticsearch-test   127.0.0.1:9201 → 9200
#   neo4j-test           127.0.0.1:7475 (HTTP) / 127.0.0.1:7688 (Bolt)
#
# Tests should set:
#   AGENT_DATABASE_URL=postgresql+asyncpg://agent:agent_dev_password@localhost:5433/personal_agent
#   AGENT_ELASTICSEARCH_URL=http://localhost:9201
#   AGENT_NEO4J_URI=bolt://localhost:7688

services:
  postgres-test:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent_dev_password}
      POSTGRES_DB: personal_agent
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d personal_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch-test:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    volumes:
      - es_test_data:/usr/share/elasticsearch/data
    ports:
      - "127.0.0.1:9201:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j-test:
    image: neo4j:5.26-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-neo4j_dev_password}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_usage__report_enabled: "false"
    volumes:
      - neo4j_test_data:/data
    ports:
      - "127.0.0.1:7475:7474"   # HTTP Browser (avoid clash with prod :7474)
      - "127.0.0.1:7688:7687"   # Bolt
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_test_data:
  es_test_data:
  neo4j_test_data:
