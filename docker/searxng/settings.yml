# SearXNG configuration for personal agent (ADR-0034)
# Docs: https://docs.searxng.org/admin/settings/

use_default_settings:
  engines:
    # Completely remove engines that fail to load in this image build,
    # rather than just disabling them (disabled still triggers a load attempt).
    remove:
      - ahmia        # missing Tor/onion deps
      - torch        # missing sentence-transformers extras
      - wikidata     # SPARQL init fails due to upstream API change

general:
  instance_name: "PersonalAgent Search"
  debug: false
  enable_metrics: true

search:
  safe_search: 0
  default_lang: "en"
  formats:
    - html
    - json

server:
  bind_address: "0.0.0.0"
  port: 8080
  secret_key: "personal-agent-searxng-secret-change-me-32chars"
  limiter: false
  public_instance: false

ui:
  default_theme: simple
  results_on_new_tab: false

engines:
  # ── General web search ──────────────────────────────────
  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: brave
    engine: brave
    shortcut: br
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false

  - name: startpage
    engine: startpage
    shortcut: sp
    disabled: false

  - name: qwant
    engine: qwant
    qwant_categ: web
    shortcut: qw
    categories: [general, web]
    disabled: false

  # ── IT / Development ────────────────────────────────────
  - name: stackoverflow
    shortcut: so
    disabled: false
    categories: it

  - name: github
    engine: github
    shortcut: gh
    disabled: false
    categories: it

  - name: mdn
    shortcut: mdn
    disabled: false
    categories: it

  - name: pypi
    engine: pypi
    shortcut: pypi
    disabled: false
    categories: it

  - name: hackernews
    engine: hackernews
    shortcut: hn
    disabled: false
    categories: it

  - name: lobste.rs
    shortcut: lo
    disabled: false
    categories: it

  - name: docker hub
    engine: docker_hub
    shortcut: dh
    disabled: false
    categories: it

  - name: huggingface
    engine: huggingface
    shortcut: hf
    disabled: false
    categories: it

  - name: huggingface datasets
    engine: huggingface
    huggingface_endpoint: datasets
    shortcut: hfd
    disabled: false
    categories: it

  - name: huggingface spaces
    engine: huggingface
    huggingface_endpoint: spaces
    shortcut: hfs
    disabled: false
    categories: it

  # ── Science / Research ──────────────────────────────────
  - name: arxiv
    engine: arxiv
    shortcut: ax
    disabled: false
    categories: science

  - name: semantic scholar
    engine: semantic_scholar
    shortcut: ss
    disabled: false
    categories: science

  - name: google scholar
    engine: google_scholar
    shortcut: gos
    disabled: false
    categories: science

  - name: pubmed
    engine: pubmed
    shortcut: pm
    disabled: false
    categories: science

  - name: crossref
    engine: crossref
    shortcut: cr
    disabled: false
    categories: science

  - name: openalex
    engine: openalex
    shortcut: oa
    disabled: false
    categories: science

  - name: openairepublications
    shortcut: oap
    disabled: false
    categories: science

  # ── News ────────────────────────────────────────────────
  - name: google news
    engine: google_news
    shortcut: gn
    disabled: false
    categories: news

  - name: bing news
    engine: bing_news
    shortcut: bn
    disabled: false
    categories: news

  - name: reuters
    engine: reuters
    shortcut: reu
    disabled: false
    categories: news

  - name: wikinews
    shortcut: wn
    disabled: false
    categories: news

  - name: qwant news
    engine: qwant
    qwant_categ: news
    shortcut: qwn
    categories: news
    network: qwant
    disabled: false

  # Note: google_news and bing_news validate language codes against internal
  # traits and do not support arbitrary locale overrides in settings.yml.
  # French press (LeMonde, Le Figaro, etc.) is surfaced via !qwn (Qwant News,
  # a French engine) and !gn / !bn when querying in French.
  # BBC / UK press is surfaced via !gn and !bn using English queries.

  # ── Social Media ─────────────────────────────────────────
  - name: reddit
    engine: reddit
    shortcut: re
    disabled: false
    categories: social_media

  - name: lemmy posts
    shortcut: lm
    disabled: false
    categories: social_media

  # ── Recipes ──────────────────────────────────────────────
  # Note: chefkoch is the primary recipe engine available in SearXNG.
  # For English recipes, use !g site:allrecipes.com or !g site:seriouseats.com
  # via the google engine — there is no dedicated English recipe engine upstream.
  - name: chefkoch
    engine: chefkoch
    shortcut: ck
    disabled: false
    categories: general

  # ── Weather ─────────────────────────────────────────────
  # WeatherUnderground has no SearXNG engine. openmeteo is the
  # best open-data alternative with hyperlocal forecast data.
  - name: wttr.in
    engine: wttr
    shortcut: wttr
    disabled: false
    categories: weather

  - name: openmeteo
    engine: open_meteo
    shortcut: om
    disabled: false
    categories: weather

  # ── Additional Science ───────────────────────────────────
  - name: springer nature
    engine: springer
    shortcut: sn
    disabled: false
    categories: science

  - name: astrophysics data system
    engine: astrophysics_data_system
    shortcut: ads
    disabled: false
    categories: science


outgoing:
  request_timeout: 8
  max_request_timeout: 15
  useragent_suffix: ""
  # Uncomment to route through a proxy:
  # proxies:
  #   all://:
  #     - socks5h://tor:9050
