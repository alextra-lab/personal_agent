# Kernel hardening parameters — Debian 12 (Bookworm)
# Applied by harden.sh to /etc/sysctl.d/99-hardening.conf
#
# These harden network-level attack surface without affecting Docker.
# Docker manages net.ipv4.ip_forward itself — do not set it here.

# ── TCP / Network ─────────────────────────────────────────────────────────────

# SYN flood protection via SYN cookies
net.ipv4.tcp_syncookies = 1

# Disable IP source routing (used in routing attacks)
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# Disable ICMP redirect acceptance (MITM vector)
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# Disable sending ICMP redirects
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Reverse path filtering — drop packets with impossible source addresses
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Ignore ICMP broadcast pings (Smurf attack mitigation)
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Ignore bogus ICMP error responses
net.ipv4.icmp_ignore_bogus_error_responses = 1

# Log packets with impossible addresses (helps detect spoofing)
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# ── Memory / Process ──────────────────────────────────────────────────────────

# ASLR — full randomisation of virtual address space
kernel.randomize_va_space = 2

# Restrict reading kernel ring buffer to root
kernel.dmesg_restrict = 1

# Restrict ptrace to parent processes only (limits process inspection)
kernel.yama.ptrace_scope = 1

# Restrict kernel pointer exposure in /proc
kernel.kptr_restrict = 1

# ── NOTE: net.ipv4.ip_forward ─────────────────────────────────────────────────
# Docker sets ip_forward=1 automatically when it starts.
# Do not disable it here — doing so would break Docker networking.
