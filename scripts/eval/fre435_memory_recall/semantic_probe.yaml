          Fermented soybeans; the densest dietary source of long-chain menaquinone, which
          keeps calcium deposited in bone instead of vessel walls.
    query: >
      Which subtle change in my eating pattern did we say could slow the buildup of mineral
      crust inside the heart-feeding pipes — the one involving a fermented bean dish and a
      particular tender salad leaf?
    expected:
      entity_names: [DASH diet, natto]
      must_not_deny: true

