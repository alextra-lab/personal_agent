# FRE-670 — vocabulary-divergent (semantic) recall probe split (ADR-0087 §D2 extension).
#
# WHY THIS PROBE EXISTS
# ---------------------
# The FRE-489 gate (bespoke_probe.yaml) is lexical-masked-as-semantic: its queries are
# oblique about entity NAMES but share DESCRIPTION-level vocabulary with the stored note
# text, so a plain BM25 keyword search beats the vector path (R@5 1.00 vs 0.72, FRE-656)
# and the 0.6B and 4B embedders score identically. This split is engineered so BM25
# CANNOT ride surface overlap: the queries describe their targets in imagery / paraphrase,
# sharing near-zero content vocabulary with the stored text. AC2 = BM25 recall@5 lands
# materially BELOW vector recall@5 on the positives (see tests/evaluation/
# test_fre670_semantic_probe.py for the structural guarantees).
#
# PROVENANCE & PII DISCIPLINE (read before editing)
# -------------------------------------------------
# Owner-authored, prod-grounded query set (telemetry/archive/fre670_probe_queries.md —
# gitignored, the auditable provenance record). The committed file is PARAPHRASED: the
# repo is public, so no PII / personal names / home locations / verbatim transcripts. Most
# cases are public-knowledge facts the owner happened to discuss (Knossos, King Charles III,
# Rayleigh scattering, Kafka log compaction) and are kept verbatim; only the home location,
# a travel companion, the two true-negative control names, and a creative-writing project
# are genericized.
#
# ANTI-GAMING DISCIPLINE: the note text (seed_entities[].description) describes the real
# STORED CONTENT in its own factual/domain vocabulary — it does NOT echo the query's
# imagery. Divergence between query and note comes from the owner's oblique phrasing, never
# from rewriting notes toward the bar (codex plan-review 2026-06-29).
#
# TAG TAXONOMY
#   type:positive | type:control
#   register:natural (everyday phrasing) | register:imagery (oblique / metaphor)
#   theme:<n>  (health crete venice history science cars music csirt location affairs writing cs)
#   pair:<id>  (links a natural case to its imagery twin — the register-delta measurement)
#   compound   (multi-fact: ≥2 expected entities; hit = primary + ≥1 supporting)
#   trap:over-recall (control engineered to tempt a wrong recall from a co-resident topic)
#   true-negative    (control whose topic is genuinely absent from the corpus)
#
# Controls carry NO seed_entities and empty `expected` (must_not_deny: false): the
# over-recall traps get their teeth from the co-resident positives (e.g. Egypt history is
# a positive, so the "future Egypt trip" trap has a tempting near-neighbour to resist).

cases:
