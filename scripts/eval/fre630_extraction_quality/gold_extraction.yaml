# FRE-630 — curated gold set for the pre-write extraction-quality benchmark.
#
# This is the labelled set that decides "is extraction getting the right things out."
# It is loadable by the harness through the GoldCase schema (gold.py).
#
# SIZE: ~36 cases (was 24). FRE-759 grew claim coverage to 12 keyed-claim cases so
# claim_emission_recall is powered (case-level ≥8/10), and added 2 entity-type-boundary
# cases (Concept↔Topic, Concept↔Technology). A gold change invalidates the historical
# 24-case baseline — re-baseline flag-OFF before any A/B (see the research doc §4.2).
#
# PROVENANCE & CURATION DISCIPLINE (read before editing)
# ------------------------------------------------------
# Cases are GROUNDED in the failure modes surfaced on Seshat's own live corpus
# (FRE-630 ticket evidence + the FRE-636 taxonomy spike) but are CURATED + PARAPHRASED
# — never verbatim transcripts. The repo is public, so:
#   * no private conversation text is copied in,
#   * no PII / owner name / home location / owned-vehicle / injected CC email /
#     deployment identifiers appear,
#   * personal specifics are replaced with generic placeholders that PRESERVE the
#     failure-mode structure (a "visit" is still a visit; a stance is still a stance).
#
# Each case pairs a source turn (user + assistant) with the EXPECTED extraction:
#   expect_entities        — gold entities: canonical name + accepted `aliases` +
#                            one of 7 `type`s + one of 3 knowledge `class`es.
#   expect_relationships   — typed-edge triples over gold canonical names (vocab: 6).
#   expect_stances/claims  — structured owner signals the extractor must EMIT, not
#                            flatten into a World description (FRE-636 finding).
#   forbid_entities        — hallucination traps that MUST NOT be extracted.
#   forbid_rel_types       — off-vocabulary edge types that MUST NOT appear
#                            (e.g. LIVES_IN / LOCATED_IN asserted for a mere visit).
#   dedup_variants         — case/spelling variants that MUST collapse to one entity.
#
# Knowledge class: World = reusable impersonal know-how; Personal = named things in
# the user's own life; System = the agent's own machinery/infra/telemetry.

cases:
  # =====================================================================
  # RESIDENCE-vs-VISIT — the ticket's headline failure mode
  # =====================================================================
  - case_id: visit-not-residence-lagoon
    tags: [residence-vs-visit, travel, world]
    source:
      user: "Last week I spent an afternoon on a small island out in a coastal lagoon — beautiful old church there."
      assistant: >
        That lagoon island is known for its medieval basilica and mosaics; it is a
        popular day-trip from the nearby city, not a residential area.
    expect_entities:
      - name: Lagoon Island
        type: Location
        class: World
        aliases: ["the lagoon island", "the island"]
        v2_type: Location
    expect_relationships: []
    forbid_entities: []
    # A single afternoon visit must NOT be promoted to residence/containment semantics.
    forbid_rel_types: [LIVES_IN, LOCATED_IN]

  - case_id: visit-not-residence-mountain-village
    tags: [residence-vs-visit, travel, world]
    source:
      user: "Passed through a little mountain village on the drive south and stopped for lunch."
      assistant: "Those high-valley villages are common rest stops on that route."
    expect_entities:
      - name: Mountain Village
        type: Location
        class: World
        aliases: ["the mountain village", "the village"]
        v2_type: Location
    expect_relationships: []
    forbid_rel_types: [LIVES_IN, LOCATED_IN]

  # =====================================================================
  # CASE-VARIANT DEDUP — the extractor's own normalization
  # =====================================================================
  - case_id: dedup-game-theory
    tags: [dedup, game-theory, world]
    source:
      user: "Coming back to Game Theory — I keep mixing up the equilibria in Game theory problems."
      assistant: >
        In game theory, a Nash equilibrium is a strategy profile where no player gains
        by unilaterally deviating.
    expect_entities:
      - name: Game Theory
        type: Concept
        class: World
        aliases: ["game theory"]
        v2_type: DomainOrTopic
      - name: Nash Equilibrium
        type: Concept
        class: World
        aliases: ["nash equilibrium"]
        v2_type: MethodOrConcept
    expect_relationships:
      - {source: Nash Equilibrium, type: PART_OF, target: Game Theory}
    dedup_variants:
      - ["Game Theory", "Game theory"]

  - case_id: dedup-philosophy-of-mind
    tags: [dedup, philosophy, world]
    source:
      user: "In Philosophy of Mind the hard problem still bugs me; Philosophy of mind readings pile up."
      assistant: "The hard problem of consciousness asks why physical processes give rise to experience."
    expect_entities:
      - name: Philosophy of Mind
        type: Topic
        class: World
        aliases: ["philosophy of mind"]
        v2_type: DomainOrTopic
      - name: Hard Problem of Consciousness
        type: Concept
        class: World
        aliases: ["the hard problem", "hard problem"]
        v2_type: MethodOrConcept
    expect_relationships:
      - {source: Hard Problem of Consciousness, type: PART_OF, target: Philosophy of Mind}
    dedup_variants:
      - ["Philosophy of Mind", "Philosophy of mind"]

  # =====================================================================
  # HALLUCINATION TRAPS — garbage / role-labels / tool-names as entities
  # =====================================================================
  - case_id: hallucination-misspelled-reltype
    tags: [hallucination, world]
    source:
      user: "Can you explain diffraction gratings?"
      assistant: >
        A diffraction grating splits light into its component wavelengths by
        interference across many closely spaced slits.
    expect_entities:
      - name: Diffraction Grating
        type: Concept
        class: World
        aliases: ["diffraction gratings", "diffraction grating"]
        v2_type: TechnicalArtifact
        v2_adjudicated: true
        v2_adjudication_rationale: "Majority (full+sonnet) — a diffraction grating is a physical, buildable/usable hardware component, matching TechnicalArtifact's software-or-hardware scope; not an abstract method."
      - name: Interference
        type: Concept
        class: World
        aliases: ["interference"]
        v2_type: Phenomenon
    expect_relationships:
      - {source: Diffraction Grating, type: USES, target: Interference}
    # A misspelled relationship type must never leak in as an :Entity.
    forbid_entities: ["DISCUSES", "RELATED", "USES"]

  - case_id: hallucination-role-labels
    tags: [hallucination, world]
    source:
      user: "Summarise what makes a good hash function."
      assistant: "A good hash function distributes keys uniformly and minimises collisions."
    expect_entities:
      - name: Hash Function
        type: Concept
        class: World
        aliases: ["hash function"]
        v2_type: MethodOrConcept
    expect_relationships: []
    # Conversation role labels must never become Person entities.
    forbid_entities: ["User", "Assistant", "System", "Reasoning"]

  - case_id: hallucination-tool-names
    tags: [hallucination, system]
    source:
      user: "Look up the current best approach for typed relation extraction."
      assistant: >
        I searched and found recent work on schema-constrained extraction; the general
        idea is to constrain the model to a fixed relation vocabulary.
    expect_entities:
      - name: Relation Extraction
        type: Concept
        class: World
        aliases: ["typed relation extraction", "relation extraction"]
        v2_type: DomainOrTopic
        v2_adjudicated: true
        v2_adjudication_rationale: "Majority (full+sonnet) — 'relation extraction' names a whole NLP subfield/task category encompassing many specific techniques, matching DomainOrTopic's 'broad field ... not a specific technique within it.'"
    expect_relationships: []
    # Internal tool identifiers are not world entities.
    forbid_entities: ["web_search", "run_python", "mcp_search"]

  # =====================================================================
  # TECH-STACK — USES correctness (the ticket's partial-facts complaint)
  # =====================================================================
  - case_id: tech-stack-uses
    tags: [tech-stack, world, relationships]
    source:
      user: "The service is a FastAPI app on Python, and it talks to a Postgres database."
      assistant: >
        FastAPI is a Python web framework; pairing it with PostgreSQL for persistence
        is a common stack.
    expect_entities:
      - name: FastAPI
        type: Technology
        class: World
        aliases: ["fastapi"]
        v2_type: TechnicalArtifact
      - name: Python
        type: Technology
        class: World
        aliases: ["python"]
        v2_type: TechnicalArtifact
      - name: PostgreSQL
        type: Technology
        class: World
        aliases: ["postgres", "postgresql"]
        v2_type: TechnicalArtifact
    expect_relationships:
      - {source: FastAPI, type: USES, target: Python}
      - {source: FastAPI, type: USES, target: PostgreSQL}

  - case_id: tech-created-by
    tags: [tech-stack, world, relationships]
    source:
      user: "Who made the Linux kernel originally?"
      assistant: "The Linux kernel was created by Linus Torvalds in 1991."
    expect_entities:
      - name: Linux Kernel
        type: Technology
        class: World
        aliases: ["linux kernel", "linux"]
        v2_type: TechnicalArtifact
      - name: Linus Torvalds
        type: Person
        class: World
        aliases: ["torvalds"]
        v2_type: Person
    expect_relationships:
      - {source: Linux Kernel, type: CREATED_BY, target: Linus Torvalds}

  # =====================================================================
  # WORLD KNOWLEDGE — entity typing across domains
  # =====================================================================
  - case_id: physics-scattering
    tags: [physics, world]
    source:
      user: "Why is the sky blue?"
      assistant: >
        Rayleigh scattering: shorter (blue) wavelengths scatter more strongly off air
        molecules than longer (red) ones, so the daytime sky looks blue.
    expect_entities:
      - name: Rayleigh Scattering
        type: Concept
        class: World
        aliases: ["rayleigh scattering"]
        v2_type: Phenomenon
      - name: Wavelength
        type: Concept
        class: World
        aliases: ["wavelength", "wavelengths"]
        v2_type: MethodOrConcept
        v2_adjudicated: true
        v2_adjudication_rationale: "Majority (mini+sonnet) — 'wavelength' names a measurable physical property/concept (a defined quantity), not an occurring phenomenon/event itself. Note: exposes a genuine taxonomy gap — physical quantities/measures (wavelength, mass, temperature) have no clean home in the 8-type vocabulary."
    expect_relationships:
      - {source: Rayleigh Scattering, type: RELATED_TO, target: Wavelength}

  - case_id: cosmology-cmb
    tags: [cosmology, physics, world]
    source:
      user: "What's the faint leftover radiation from the early universe called?"
      assistant: >
        The cosmic microwave background — relic radiation from about 380,000 years
        after the Big Bang, when the universe became transparent.
    expect_entities:
      - name: Cosmic Microwave Background
        type: Concept
        class: World
        aliases: ["cmb", "cosmic microwave background"]
        v2_type: Phenomenon
      - name: Big Bang
        type: Event
        class: World
        aliases: ["the big bang", "big bang"]
        v2_type: Event
    expect_relationships:
      - {source: Cosmic Microwave Background, type: RELATED_TO, target: Big Bang}

  - case_id: optics-diffraction-limit
    tags: [optics, physics, world]
    source:
      user: "What sets the smallest thing an optical microscope can resolve?"
      assistant: >
        The diffraction limit — roughly half the wavelength of light — bounds the
        resolution of a conventional optical microscope.
    expect_entities:
      - name: Diffraction Limit
        type: Concept
        class: World
        aliases: ["the diffraction limit", "diffraction limit"]
        v2_type: Phenomenon
        v2_adjudicated: true
        v2_adjudication_rationale: "Majority (full+sonnet) — the diffraction limit is a naturally-arising physical effect/constraint from wave optics, not human-invented; fits Phenomenon's 'effect ... exists independently of human design.'"
      - name: Optical Microscope
        type: Technology
        class: World
        aliases: ["optical microscope"]
        v2_type: TechnicalArtifact
    expect_relationships:
      - {source: Diffraction Limit, type: RELATED_TO, target: Optical Microscope}

  - case_id: cooking-technique
    tags: [cooking, world]
    source:
      user: "How do I get really smooth hummus?"
      assistant: >
        Peel the chickpeas or simmer them with a little baking soda until very soft,
        then blend with ice-cold water and plenty of tahini.
    expect_entities:
      - name: Hummus
        type: Concept
        class: World
        aliases: ["hummus"]
        v2_type: MethodOrConcept
        v2_adjudicated: true
        v2_adjudication_rationale: "Overriding majority (TechnicalArtifact) — that type's definition is explicitly scoped to 'software or hardware' (e.g. Python, Neo4j, a GPU); a food dish doesn't fit despite being physically concrete. The conversation is about the *preparation technique*; kept consistent with the Mapo Tofu adjudication below."
      - name: Tahini
        type: Concept
        class: World
        aliases: ["tahini"]
        v2_type: TechnicalArtifact
    expect_relationships:
      - {source: Hummus, type: USES, target: Tahini}

  - case_id: history-bronze-age
    tags: [history, world]
    source:
      user: "Tell me about the Bronze Age civilisation on Crete."
      assistant: >
        The Minoan civilisation flourished on Crete in the Bronze Age, centred on
        palace complexes such as Knossos.
    expect_entities:
      - name: Minoan Civilisation
        type: Concept
        class: World
        aliases: ["the minoans", "minoan civilisation", "minoans"]
        v2_type: DomainOrTopic
        v2_adjudicated: true
        v2_adjudication_rationale: "Majority (mini+full) — a civilisation is a historical/cultural subject of study, not a structured institution/company (Organization's definition)."
      - name: Crete
        type: Location
        class: World
        aliases: ["crete"]
        v2_type: Location
      - name: Knossos
        type: Location
        class: World
        aliases: ["knossos"]
        v2_type: Location
    expect_relationships:
      - {source: Knossos, type: LOCATED_IN, target: Crete}

  - case_id: located-in-correct
    tags: [geography, world, relationships]
    source:
      user: "Is the Alhambra in Granada?"
      assistant: "Yes — the Alhambra is a palace and fortress complex located in Granada, Spain."
    expect_entities:
      - name: Alhambra
        type: Location
        class: World
        aliases: ["the alhambra", "alhambra"]
        v2_type: Location
      - name: Granada
        type: Location
        class: World
        aliases: ["granada"]
        v2_type: Location
    # A genuine geographic containment — LOCATED_IN is CORRECT here (contrast the visit cases).
    expect_relationships:
      - {source: Alhambra, type: LOCATED_IN, target: Granada}

  - case_id: game-theory-prisoners-dilemma
    tags: [game-theory, world, relationships]
    source:
      user: "Remind me how the Prisoner's Dilemma works."
      assistant: >
        The Prisoner's Dilemma is a canonical game in game theory where mutual
        defection is the dominant-strategy equilibrium despite mutual cooperation
        paying better.
    expect_entities:
      - name: Prisoner's Dilemma
        type: Concept
        class: World
        aliases: ["prisoners dilemma", "the prisoner's dilemma"]
        v2_type: MethodOrConcept
      - name: Game Theory
        type: Concept
        class: World
        aliases: ["game theory"]
        v2_type: DomainOrTopic
    expect_relationships:
      - {source: Prisoner's Dilemma, type: PART_OF, target: Game Theory}

  - case_id: cs-data-structure
    tags: [cs, world]
    source:
      user: "When would I reach for a trie?"
      assistant: >
        A trie is a tree data structure for storing strings by shared prefixes; it
        shines for autocomplete and prefix search.
    expect_entities:
      - name: Trie
        type: Concept
        class: World
        aliases: ["a trie", "trie"]
        v2_type: MethodOrConcept
      - name: Prefix Search
        type: Concept
        class: World
        aliases: ["prefix search"]
        v2_type: MethodOrConcept
    expect_relationships:
      - {source: Trie, type: USES, target: Prefix Search}

  - case_id: security-incident-response
    tags: [security, csirt, world]
    source:
      user: "What's a standard incident-response lifecycle?"
      assistant: >
        A common one has phases: preparation, detection and analysis, containment,
        eradication and recovery, and post-incident review.
    expect_entities:
      - name: Incident Response
        type: Concept
        class: World
        aliases: ["incident response", "incident-response"]
        v2_type: MethodOrConcept
        v2_adjudicated: true
        v2_adjudication_rationale: "Majority (mini+sonnet) — names a specific structured methodology/lifecycle (defined phases: preparation, detection, containment, ...), matching MethodOrConcept's 'method ... pattern,' not a whole field."
      - name: Containment
        type: Concept
        class: World
        aliases: ["containment"]
        v2_type: MethodOrConcept
    expect_relationships:
      - {source: Containment, type: PART_OF, target: Incident Response}

  # =====================================================================
  # STANCE / CLAIM EMISSION — must be structured, not flattened (FRE-636)
  # =====================================================================
  - case_id: stance-and-claim-vehicle
    tags: [stance, claim, personal, world]
    source:
      user: "My current lease is nearly up so I'm shopping again — honestly I love a manual gearbox, always have."
      assistant: >
        A manual transmission gives direct control over gear selection; fewer new
        models offer one each year.
    expect_entities:
      - name: Manual Transmission
        type: Concept
        class: World
        aliases: ["manual gearbox", "manual transmission"]
        v2_type: TechnicalArtifact
        v2_adjudicated: true
        v2_adjudication_rationale: "Majority (full+sonnet) — a concrete, physically installable/usable mechanical hardware component; genuinely engineered hardware, unlike the food-dish cases."
    expect_relationships: []
    # The affect toward the manual gearbox is a STANCE, not a World-description clause.
    expect_stances:
      - {target: Manual Transmission, affect: likes strongly}
    # The lease-ending situational fact is a PERSONAL CLAIM, not dropped.
    expect_claims:
      - {facet: lease_status, content_gist: the user's current vehicle lease is nearly finished}

  - case_id: stance-ear-training-goal
    tags: [stance, music, world]
    source:
      user: "I want to finally nail interval recognition by ear this year."
      assistant: >
        Ear training builds interval recognition through graded drills — singing and
        identifying intervals against a reference pitch.
    expect_entities:
      - name: Ear Training
        type: Concept
        class: World
        aliases: ["ear training"]
        v2_type: MethodOrConcept
        v2_adjudicated: true
        v2_adjudication_rationale: "Majority (mini+sonnet) — a specific practice/technique (graded drills) for building a skill, not a broad field."
      - name: Interval Recognition
        type: Concept
        class: World
        aliases: ["interval recognition"]
        v2_type: MethodOrConcept
    expect_relationships:
      - {source: Interval Recognition, type: PART_OF, target: Ear Training}
    expect_stances:
      - {target: Interval Recognition, affect: a practical learning goal}

  - case_id: stance-preferred-cuisine
    tags: [stance, cooking, world]
    source:
      user: "Give me a weeknight idea — I lean hard into spicy Sichuan food."
      assistant: >
        Sichuan cuisine is defined by the numbing heat of Sichuan peppercorns and
        chilli; mapo tofu is a fast weeknight classic.
    expect_entities:
      - name: Sichuan Cuisine
        type: Concept
        class: World
        aliases: ["sichuan food", "sichuan cuisine"]
        v2_type: DomainOrTopic
      - name: Mapo Tofu
        type: Concept
        class: World
        aliases: ["mapo tofu"]
        v2_type: MethodOrConcept
        v2_adjudicated: true
        v2_adjudication_rationale: "Majority (mini+full), consistent with the Hummus adjudication above — a named dish/recipe is closer to a human-invented preparation concept than to TechnicalArtifact's software-or-hardware scope."
    expect_stances:
      - {target: Sichuan Cuisine, affect: strongly prefers}

  # =====================================================================
  # PERSONAL class — named things in the user's own life
  # =====================================================================
  - case_id: personal-writing-project
    tags: [personal, neuroscience, world]
    source:
      user: "Back to the chapter I'm drafting on neuroplasticity — I want to tie in learning."
      assistant: >
        Neuroplasticity is the brain's capacity to reorganise its connections with
        experience, which is the substrate of learning.
    expect_entities:
      - name: Neuroplasticity
        type: Concept
        class: World
        aliases: ["neuroplasticity"]
        v2_type: Phenomenon
        v2_adjudicated: true
        v2_adjudication_rationale: "Majority (mini+sonnet) — a naturally-occurring biological process (like photosynthesis, the ADR's own Phenomenon example), not a field of study itself."
      - name: Learning
        type: Concept
        class: World
        aliases: ["learning"]
        v2_type: DomainOrTopic
        v2_adjudicated: true
        v2_adjudication_rationale: "Majority (full+sonnet) — used generically ('the substrate of learning'), this invokes the broad subject of learning as a field of study, not a single named biological process."
      # The user's own drafted artifact is a Personal-class entity (named thing in their life).
      - name: Neuroplasticity Chapter
        type: Topic
        class: Personal
        aliases: ["the chapter", "the chapter i'm drafting", "my chapter"]
        v2_type: TechnicalArtifact
        v2_adjudicated: true
        v2_adjudication_rationale: "3-way split (MethodOrConcept/TechnicalArtifact/Event) — no clean fit. A personal creative-writing artifact (a chapter draft) doesn't map onto any V2 type designed for world-knowledge entities. Provisionally ruled TechnicalArtifact (closest: a concrete, named authored artifact) but this exposes a genuine taxonomy gap for Personal-class creative works; NEEDS OWNER SIGN-OFF before FRE-771 treats this as settled."
        v2_needs_owner_signoff: true
    expect_relationships:
      - {source: Neuroplasticity, type: RELATED_TO, target: Learning}
      - {source: Neuroplasticity Chapter, type: RELATED_TO, target: Neuroplasticity}
    # The drafted chapter is also a Personal claim/artifact, not World knowledge.
    expect_claims:
      - {facet: writing_project, content_gist: the user is drafting a chapter on neuroplasticity}

  # =====================================================================
  # SYSTEM class — the agent's own machinery (the ~46% operational bucket)
  # =====================================================================
  - case_id: system-self-telemetry
    tags: [system, agent-arch]
    source:
      user: "Why did the last consolidation run get budget-denied?"
      assistant: >
        The consolidation attempt hit the entity-extraction daily cost cap, so the
        cost gate denied it and it will retry next window.
    expect_entities:
      - name: Consolidation Run
        type: Event
        class: System
        aliases: ["consolidation run", "consolidation attempt", "the last consolidation run"]
        v2_type: Event
      - name: Cost Gate
        type: Technology
        class: System
        aliases: ["the cost gate", "cost gate"]
        v2_type: TechnicalArtifact
        v2_adjudicated: true
        v2_adjudication_rationale: "Overriding majority (MethodOrConcept) — the Cost Gate is a concrete, deployed software component (ADR-0065's Postgres-backed reservation system, the `cost_gate/` module), not an abstract policy; 'software or hardware' explicitly covers backend services like this."
    expect_relationships: []
    # This is agent operational state, not user knowledge — must be class=System.

  - case_id: system-graph-store
    tags: [system, agent-arch]
    source:
      user: "Which store holds the knowledge graph again?"
      assistant: "The knowledge graph lives in Neo4j; sessions and costs are in Postgres."
    expect_entities:
      - name: Neo4j
        type: Technology
        class: System
        aliases: ["neo4j"]
        v2_type: TechnicalArtifact
      - name: Knowledge Graph
        type: Concept
        class: System
        aliases: ["the knowledge graph", "knowledge graph"]
        v2_type: MethodOrConcept
    expect_relationships:
      - {source: Knowledge Graph, type: PART_OF, target: Neo4j}

  # =====================================================================
  # CLAIM EMISSION — FRE-759: powered set for claim_emission_recall.
  # First-person SITUATIONAL facts about the user's own life that must be
  # emitted as keyed `claims`, never dropped or flattened into an entity.
  # Grounded/paraphrased, no PII; each carries a distinct stable facet slot.
  # =====================================================================
  - case_id: claim-new-employer
    tags: [claim, personal, world]
    source:
      user: "I started at a small robotics firm last week — still finding my feet."
      assistant: >
        Robotics engineering blends mechanical design, control systems, and
        software; onboarding at a small firm usually means wearing several hats.
    expect_entities:
      - name: Robotics
        type: Topic
        class: World
        aliases: ["robotics", "robotics engineering"]
        v2_type: DomainOrTopic
    expect_claims:
      - {facet: employer, content_gist: the user recently started a job at a robotics firm}

  - case_id: claim-relocation
    tags: [claim, personal, world]
    source:
      user: "We're moving to a coastal town next month, so everything's in boxes."
      assistant: "Coastal relocations often mean adjusting to humidity and salt-air upkeep."
    expect_claims:
      - {facet: current_city, content_gist: the user is relocating to a coastal town next month}

  - case_id: claim-car-shopping
    tags: [claim, personal, world]
    source:
      user: "I'm test-driving compact SUVs this month before I commit to one."
      assistant: >
        Compact SUVs balance cargo room and efficiency; hybrids are worth a
        look if most of your driving is urban.
    expect_entities:
      - name: Compact SUV
        type: Concept
        class: World
        aliases: ["compact suvs", "compact suv"]
        v2_type: TechnicalArtifact
        v2_adjudicated: true
        v2_adjudication_rationale: "Majority (full+sonnet) — names a vehicle category rather than one specific model, but still a concrete, physically-driveable hardware class (consistent with Manual Transmission), closer to TechnicalArtifact than to an abstract field of study."
    expect_claims:
      - {facet: car_shopping_status, content_gist: the user is actively shopping for a compact SUV}

  - case_id: claim-home-renovation
    tags: [claim, personal, world]
    source:
      user: "We're mid-renovation on the kitchen right now, so cooking is chaos."
      assistant: "Kitchen renovations often overrun; a temporary prep station helps."
