#     (ADR-0074 §I5); the static string-chunk analyzer cannot see the joined
#     props. Line shifted 752 → 871 → 913 → 951 → 991 → 1125 → 1208 → 1414 → 1419 (FRE-369, FRE-672
#     selector helper, FRE-638 Claims imports + _parse_iso, FRE-711 living-description
#     gate block, FRE-707 structural-arm builder + shared entity-parse helper, FRE-723
#     lexical/multi-query arm imports + module-level helpers, FRE-725 description
#     update-kind constants + create_entity signal param/docstring inserted above, then
#     FRE-864 ADR-0115 D2 class SET-clause block inserted above). ---
- path: src/personal_agent/memory/service.py
