# Identity-threading lint allowlist (ADR-0074 §I3/§I5; FRE-393).
#
# The hook (scripts/check_identity_threaded.py) is SCOPE-AWARE: a log.* call
# must carry trace_id when trace_id is reachable in its enclosing function;
# if only session_id is reachable (connection/lifespan scope) it must carry
# session_id; if no identity is reachable (pure boot/module scope) it is
# exempt automatically. So lifecycle/connection logs no longer need allowlist
# entries — only genuine false-positives and background-scope sites do.
#
# Each entry exempts a single (path, line) violation; only (path, line) is
# matched (pattern/reason are documentation).
#
# Schema:
#   - path: str    (relative to repo root, as printed by the lint)
#     line: int     (1-based; must match current source)
#     pattern: str  ("log" | "cypher_merge")
#     reason: str

# --- Background backfill scan: scan-level logs; per-capture trace_id is a loop
#     variable used as a document id, not a single request trace for the scan. ---
- path: src/personal_agent/captains_log/backfill.py
  line: 206
  pattern: log
  reason: "run_backfill scan start — background job, no per-request trace at scan scope"
- path: src/personal_agent/captains_log/backfill.py
  line: 253
  pattern: log
  reason: "run_backfill scan warning — background job, scan-level (no single trace_id)"
- path: src/personal_agent/captains_log/backfill.py
  line: 304
  pattern: log
  reason: "run_backfill scan warning — background job, scan-level (no single trace_id)"
- path: src/personal_agent/captains_log/backfill.py
  line: 315
  pattern: log
  reason: "run_backfill scan summary — background job, scan-level (no single trace_id)"

# --- Event consumer pre-parse guards: trace_id is extracted from the payload
#     AFTER these guards; an unparseable/empty message has no trace to thread. ---
- path: src/personal_agent/events/consumer.py
  line: 145
  pattern: log
  reason: "consumer_message_missing_data — pre-parse guard, payload (and trace_id) unavailable"
- path: src/personal_agent/events/consumer.py
  line: 157
  pattern: log
  reason: "consumer_deserialize_error — payload failed to parse, no trace_id extractable"

# --- Telemetry sink: a bulk index failure spans the whole batch; trace_id is a
#     per-event loop variable, not a single id for the failed batch. ---
- path: src/personal_agent/telemetry/es_logger.py
  line: 217
  pattern: log
  reason: "elasticsearch_bulk_failed — batch-level sink failure, no single trace_id for the bulk"

