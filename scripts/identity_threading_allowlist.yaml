# Identity-threading lint allowlist (FRE-376 Phase 3, ADR-0074 §I3/§I5).
#
# Each entry exempts a single (path, line) violation. The `reason` field
# documents why this site can't carry identity (must remain valid context-free).
#
# Categories used in this baseline:
#   - lifecycle logs (FastAPI startup/shutdown, sensor lifecycle, TCP preflight)
#   - substrate-layer alerts (memory, mcp, transport, captains_log, telemetry,
#     brainstem, second_brain, insights, cost_gate, config, events/consumers)
#   - pure helpers and getters (no request context exists in scope)
#   - dynamic Cypher build with conditional set_clauses (covered by unit tests)
#
# Schema:
#   - path: str       (relative to repo root, as printed by the lint)
#     line: int       (1-based, must match current source)
#     pattern: str    ("log", "bus.publish", "cypher_merge")
#     reason: str     (one-line justification)

